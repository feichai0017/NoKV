#
# Build configuration for the embedded golangci-lint binary that ships NoKV's
# repository-specific code-contract analyzers. Regenerate with:
#
#   golangci-lint custom
#
# The resulting ./bin/custom-gcl is used by `make lint` as a drop-in
# replacement for golangci-lint.

version: v2.9.0
name: custom-gcl
destination: ./bin

plugins:
  - module: github.com/feichai0017/NoKV/tools/lint
    path: ./tools/lint
