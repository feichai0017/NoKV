name: Release Images

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build, for example v0.1.0"
        required: true
      version:
        description: "Release version, for example v0.1.0"
        required: true
      rust_version:
        description: "Rust toolchain image version"
        required: true
        default: "1.88"
      debian_version:
        description: "Debian image version"
        required: true
        default: "bookworm"

permissions:
  contents: read
  packages: write

jobs:
  images:
    name: images
    runs-on: ubuntu-latest
    env:
      GHCR_IMAGE: ghcr.io/feichai0017/nokv
      DOCKERHUB_IMAGE: docker.io/feichai0017/nokv
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          plain="${version#v}"
          IFS=. read -r major minor patch <<<"$plain"
          if [[ -z "${major:-}" || -z "${minor:-}" || -z "${patch:-}" ]]; then
            echo "::error title=Invalid release version::Expected vMAJOR.MINOR.PATCH, got $version"
            exit 1
          fi

          {
            echo "ghcr<<EOF"
            printf '%s:%s\n' "$GHCR_IMAGE" "$version"
            printf '%s:%s\n' "$GHCR_IMAGE" "$plain"
            printf '%s:%s.%s\n' "$GHCR_IMAGE" "$major" "$minor"
            printf '%s:%s\n' "$GHCR_IMAGE" "$major"
            printf '%s:latest\n' "$GHCR_IMAGE"
            echo "EOF"
          } >>"$GITHUB_OUTPUT"

          {
            echo "dockerhub<<EOF"
            printf '%s:%s\n' "$DOCKERHUB_IMAGE" "$version"
            printf '%s:%s\n' "$DOCKERHUB_IMAGE" "$plain"
            printf '%s:%s.%s\n' "$DOCKERHUB_IMAGE" "$major" "$minor"
            printf '%s:%s\n' "$DOCKERHUB_IMAGE" "$major"
            printf '%s:latest\n' "$DOCKERHUB_IMAGE"
            echo "EOF"
          } >>"$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GHCR image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            RUST_VERSION=${{ inputs.rust_version }}
            DEBIAN_VERSION=${{ inputs.debian_version }}
            NOKV_PACKAGE=nokv
            NOKV_BINARY=nokv
          push: true
          tags: ${{ steps.tags.outputs.ghcr }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Publish Docker Hub image
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            RUST_VERSION=${{ inputs.rust_version }}
            DEBIAN_VERSION=${{ inputs.debian_version }}
            NOKV_PACKAGE=nokv
            NOKV_BINARY=nokv
          push: true
          tags: ${{ steps.tags.outputs.dockerhub }}
