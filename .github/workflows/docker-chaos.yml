name: Docker Chaos

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * 1,4"

permissions:
  contents: read

jobs:
  fsmeta-history-chaos:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - name: Docker fsmeta history chaos
        env:
          NOKV_DOCKER_CHAOS_DOWN: "1"
          NOKV_DOCKER_CHAOS_SEEDS: "2"
          NOKV_DOCKER_CHAOS_STEPS: "32"
          NOKV_DOCKER_CHAOS_BATCH: "3"
          NOKV_DOCKER_CHAOS_TIMEOUT: "120s"
          NOKV_DOCKER_CHAOS_INTERVAL: "2"
        run: ./scripts/chaos/docker_fsmeta_history.sh
