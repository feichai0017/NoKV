name: Benchmark

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/fsmeta-benchmark.yml"
      - "benchmark/**"
      - "cmd/nokv/**"
      - "cmd/nokv-fsmeta/**"
      - "coordinator/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "errors/**"
      - "fsmeta/**"
      - "go.mod"
      - "go.sum"
      - "local/**"
      - "Makefile"
      - "metrics/**"
      - "meta/**"
      - "pb/**"
      - "proto/**"
      - "raftstore/**"
      - "scripts/run_fsmeta_benchmarks.sh"
      - "storage/**"
      - "txn/**"
      - "utils/**"
  workflow_dispatch:
    inputs:
      profile:
        description: "Benchmark profile"
        type: choice
        required: true
        default: "long"
        options:
          - median
          - long
          - official
  schedule:
    - cron: "19 17 * * 0"

permissions:
  contents: read

jobs:
  fsmeta-median:
    name: Benchmark / fsmeta median
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'median')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - name: Run median fsmeta workload matrix
        env:
          NOKV_FSMETA_BENCH_MODE: local
          NOKV_FSMETA_PROFILE: median
          NOKV_FSMETA_OUTPUT_DIR: benchmark/data/fsmeta/results
          NOKV_FSMETA_LOCAL_LOG_DIR: benchmark/data/fsmeta/ci
          NOKV_FSMETA_LOCAL_WORKDIR: benchmark/data/fsmeta/local
          NOKV_FSMETA_RESET_BETWEEN_WORKLOADS: "1"
        run: make fsmeta-bench

      - name: Collect local fsmeta diagnostics
        if: always()
        run: |
          mkdir -p benchmark/data/fsmeta/ci
          find benchmark/data/fsmeta/ci -maxdepth 1 -type f -print > benchmark/data/fsmeta/ci/files.txt || true

      - name: Upload fsmeta benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fsmeta-median-${{ github.run_id }}
          path: |
            benchmark/data/fsmeta/results/*.csv
            benchmark/data/fsmeta/results/*.manifest.txt
            benchmark/data/fsmeta/profiles/**
            benchmark/data/fsmeta/ci/*.txt
            benchmark/data/fsmeta/ci/*.log
            benchmark/data/fsmeta/ci/*.json
          if-no-files-found: ignore

  fsmeta-long:
    name: Benchmark / fsmeta long
    # Full long/official fsmeta matrices are performance evidence, not a fast
    # main-push correctness gate. Keep push/PR coverage on the median job and
    # reserve this job for scheduled runs or explicit operator dispatch.
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.profile == 'long' || github.event.inputs.profile == 'official'))
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - name: Run long fsmeta workload matrix
        env:
          NOKV_FSMETA_BENCH_MODE: local
          NOKV_FSMETA_PROFILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile || 'long' }}
          NOKV_FSMETA_CAPTURE_PROFILES: "1"
          NOKV_FSMETA_PROFILE_SECONDS: "60"
          NOKV_FSMETA_OUTPUT_DIR: benchmark/data/fsmeta/results
          NOKV_FSMETA_LOCAL_LOG_DIR: benchmark/data/fsmeta/ci
          NOKV_FSMETA_LOCAL_WORKDIR: benchmark/data/fsmeta/local
          NOKV_FSMETA_RESET_BETWEEN_WORKLOADS: "1"
        run: make fsmeta-bench

      - name: Collect local fsmeta diagnostics
        if: always()
        run: |
          mkdir -p benchmark/data/fsmeta/ci
          find benchmark/data/fsmeta/ci -maxdepth 1 -type f -print > benchmark/data/fsmeta/ci/files.txt || true

      - name: Upload fsmeta benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fsmeta-long-${{ github.run_id }}
          path: |
            benchmark/data/fsmeta/results/*.csv
            benchmark/data/fsmeta/results/*.manifest.txt
            benchmark/data/fsmeta/profiles/**
            benchmark/data/fsmeta/ci/*.txt
            benchmark/data/fsmeta/ci/*.log
            benchmark/data/fsmeta/ci/*.json
          if-no-files-found: ignore
