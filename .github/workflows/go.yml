# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.2'

    - name: Install tools
      run: make install-tools

    - name: Proto check
      run: |
        for attempt in 1 2 3; do
          if make proto-check; then
            exit 0
          fi
          if [ "$attempt" -eq 3 ]; then
            exit 1
          fi
          sleep $((attempt * 10))
        done

    - name: Format
      run: |
        make fmt
        git diff --exit-code

    - name: Generated code
      run: |
        go generate ./fsmeta/exec/compile
        git diff --exit-code -- fsmeta/exec/compile

    - name: Lint
      run: make lint

    - name: Build
      run: make build

    - name: Correctness smoke
      run: make test-correctness-smoke

    - name: Test
      run: make test
