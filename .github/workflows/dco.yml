name: DCO

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: read

jobs:
  signoff:
    # Public PR/main checks are the DCO source of truth. The private mirror syncs
    # public main in bulk and would otherwise re-scan historical public commits.
    if: github.repository != 'feichai0017/NoKV-private'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check commit sign-offs
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            range="${{ github.event.pull_request.base.sha }}..HEAD"
          else
            before="${{ github.event.before }}"
            if [[ "$before" =~ ^0+$ ]]; then
              range="${{ github.sha }}^..${{ github.sha }}"
            else
              range="$before..${{ github.sha }}"
            fi
          fi

          if ! commits="$(git rev-list --no-merges "$range")"; then
            echo "::error title=Invalid DCO commit range::Unable to resolve commit range $range."
            exit 1
          fi
          if [[ -z "$commits" ]]; then
            echo "No non-merge commits to check."
            exit 0
          fi

          missing=0
          has_signoff() {
            local message="$1"
            local trailers
            trailers="$(git interpret-trailers --parse <<<"$message")"
            if grep -Eiq '^Signed-off-by: .+ <[^>]+>$' <<<"$trailers"; then
              return 0
            fi

            # Dependabot messages contain an updated-dependencies YAML block that
            # can make git interpret-trailers miss the final trailer paragraph.
            # Keep the fallback trailer-shaped by checking only the last
            # non-empty paragraph, not the whole commit body.
            local last_paragraph
            last_paragraph="$(awk '
              NF {
                block = block $0 "\n"
                next
              }
              block != "" {
                last = block
                block = ""
              }
              END {
                if (block != "") {
                  last = block
                }
                printf "%s", last
              }
            ' <<<"$message")"
            grep -Eiq '^Signed-off-by: .+ <[^>]+>$' <<<"$last_paragraph"
          }

          verify_pr_commits_have_signoff() {
            local pr="$1"
            local page=1
            local checked=0

            while :; do
              local response
              response="$(curl -fsSL \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pulls/$pr/commits?per_page=100&page=$page")"

              local page_count
              page_count="$(jq 'length' <<<"$response")"
              if [[ "$page_count" -eq 0 ]]; then
                break
              fi

              while IFS= read -r encoded; do
                local message
                message="$(base64 -d <<<"$encoded" | jq -r '.commit.message')"
                checked=$((checked + 1))
                if ! has_signoff "$message"; then
                  return 1
                fi
              done < <(jq -r '.[] | select((.parents | length) <= 1) | @base64' <<<"$response")

              if [[ "$page_count" -lt 100 ]]; then
                break
              fi
              page=$((page + 1))
            done

            [[ "$checked" -gt 0 ]]
          }

          accepts_signed_pr_squash() {
            local commit="$1"
            local subject
            subject="$(git show -s --format=%s "$commit")"

            if [[ "${{ github.event_name }}" != "push" || "${{ github.ref }}" != "refs/heads/main" ]]; then
              return 1
            fi
            if [[ ! "$subject" =~ \(\#([0-9]+)\)$ ]]; then
              return 1
            fi

            local pr="${BASH_REMATCH[1]}"
            if verify_pr_commits_have_signoff "$pr"; then
              echo "::notice title=DCO checked on PR commits::Accepted unsigned squash commit $commit because PR #$pr commits include Signed-off-by trailers."
              return 0
            fi
            return 1
          }

          while IFS= read -r commit; do
            message="$(git show -s --format=%B "$commit")"
            if ! has_signoff "$message" && ! accepts_signed_pr_squash "$commit"; then
              echo "::error title=Missing DCO sign-off::Commit $commit is missing a Signed-off-by trailer."
              git show -s --format='%h %s' "$commit"
              missing=1
            fi
          done <<<"$commits"

          if [[ "$missing" -ne 0 ]]; then
            cat <<'EOF'

          Add a Developer Certificate of Origin sign-off to every commit:

            git commit -s -m "type: subject"

          If the latest commit is missing a sign-off:

            git commit --amend -s --no-edit

          For a local branch with multiple commits:

            git rebase --signoff origin/main

          EOF
            exit 1
          fi

          echo "All checked commits include Signed-off-by trailers."
