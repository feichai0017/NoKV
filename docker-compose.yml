# NoKV HA deployment: 3 meta-root + 3 coordinators + 3 stores + 1 Redis gateway.
# Every running service exposes a /debug/vars expvar endpoint for dashboards.
#
# Usage:
#   docker compose up -d --build
#   docker compose logs -f
#   docker compose down -v    # wipes data volumes too
#
# Architecture:
#   Truth plane:     3× meta-root  (replicated raft, quorum of 2 — tolerates 1 peer loss)
#   Control plane:   3× coordinator (Eunomia lease-gated singleton; one active holder, two standby)
#   Execution plane: 3× store      (per-region raft, quorum of 2)
#   Gateway:         1× nokv-redis (RESP-compatible; multi-endpoint failover client-side)
#
# Clients (stores, gateway) dial all three coordinators as a comma-separated
# --coordinator-addr list. coordinator/client.GRPCClient parses that list,
# keeps a preferred endpoint, and transparently fails over to another
# coordinator on FailedPrecondition "coordinator lease not held" / "coordinator
# not leader" errors. If the active Tenure holder dies, the next
# write retries and lands on whichever standby has grabbed the lease.
#
# Every runtime binary (coordinator, store, redis, meta-root) exposes expvar
# at /debug/vars via its own --metrics-addr flag; ports 9380-9382 belong to
# the three meta-root peers.

x-nokv-image: &nokv-image
  build: .
  image: nokv:latest

x-common: &common
  image: nokv:latest
  restart: unless-stopped
  stop_signal: SIGINT
  stop_grace_period: 30s

services:
  # ---------- bootstrap (seed stores once, then exit) ----------
  bootstrap:
    <<: *nokv-image
    container_name: nokv-bootstrap
    entrypoint: ["/usr/local/bin/bootstrap.sh"]
    command:
      - "--config"
      - "/etc/nokv/raft_config.json"
      - "--path-template"
      - "/volumes/store-{id}"
      - "--skip-existing"
    volumes:
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
      - store1-data:/volumes/store-1
      - store2-data:/volumes/store-2
      - store3-data:/volumes/store-3
    restart: "no"

  # ============= TRUTH PLANE: 3× meta-root (raft quorum) =============
  meta-root-1:
    <<: *common
    container_name: nokv-meta-root-1
    entrypoint: ["/usr/local/bin/nokv"]
    command:
      - "meta-root"
      - "--config=/etc/nokv/raft_config.json"
      - "--scope=docker"
      - "--node-id=1"
      - "--addr=0.0.0.0:2380"
      - "--metrics-addr=0.0.0.0:9380"
    volumes:
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
      - meta-root-1-data:/var/lib/nokv-meta-root
    expose: ["2380", "2480", "9380"]
    ports:
      - "2380:2380"   # gRPC service (coord / eunomia-audit from host dial here)
      - "9380:9380"   # expvar dashboard

  meta-root-2:
    <<: *common
    container_name: nokv-meta-root-2
    entrypoint: ["/usr/local/bin/nokv"]
    command:
      - "meta-root"
      - "--config=/etc/nokv/raft_config.json"
      - "--scope=docker"
      - "--node-id=2"
      - "--addr=0.0.0.0:2380"
      - "--metrics-addr=0.0.0.0:9380"
    volumes:
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
      - meta-root-2-data:/var/lib/nokv-meta-root
    expose: ["2380", "2480", "9380"]
    ports:
      - "2381:2380"
      - "9381:9380"

  meta-root-3:
    <<: *common
    container_name: nokv-meta-root-3
    entrypoint: ["/usr/local/bin/nokv"]
    command:
      - "meta-root"
      - "--config=/etc/nokv/raft_config.json"
      - "--scope=docker"
      - "--node-id=3"
      - "--addr=0.0.0.0:2380"
      - "--metrics-addr=0.0.0.0:9380"
    volumes:
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
      - meta-root-3-data:/var/lib/nokv-meta-root
    expose: ["2380", "2480", "9380"]
    ports:
      - "2382:2380"
      - "9382:9380"

  # ============= CONTROL PLANE: 3× coordinator (Eunomia lease HA) =============
  coordinator-1:
    <<: *common
    container_name: nokv-coordinator-1
    entrypoint: ["/usr/local/bin/nokv"]
    command:
      - "coordinator"
      - "--config=/etc/nokv/raft_config.json"
      - "--scope=docker"
      - "--addr=0.0.0.0:2379"
      - "--metrics-addr=0.0.0.0:9100"
      - "--coordinator-id=coord-1"
    volumes:
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
    expose: ["2379", "9100"]
    ports:
      - "2390:2379"   # coordinator gRPC
      - "9100:9100"   # expvar
    depends_on:
      meta-root-1: { condition: service_started }
      meta-root-2: { condition: service_started }
      meta-root-3: { condition: service_started }

  coordinator-2:
    <<: *common
    container_name: nokv-coordinator-2
    entrypoint: ["/usr/local/bin/nokv"]
    command:
      - "coordinator"
      - "--config=/etc/nokv/raft_config.json"
      - "--scope=docker"
      - "--addr=0.0.0.0:2379"
      - "--metrics-addr=0.0.0.0:9100"
      - "--coordinator-id=coord-2"
    volumes:
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
    expose: ["2379", "9100"]
    ports:
      - "2391:2379"
      - "9101:9100"
    depends_on:
      meta-root-1: { condition: service_started }
      meta-root-2: { condition: service_started }
      meta-root-3: { condition: service_started }

  coordinator-3:
    <<: *common
    container_name: nokv-coordinator-3
    entrypoint: ["/usr/local/bin/nokv"]
    command:
      - "coordinator"
      - "--config=/etc/nokv/raft_config.json"
      - "--scope=docker"
      - "--addr=0.0.0.0:2379"
      - "--metrics-addr=0.0.0.0:9100"
      - "--coordinator-id=coord-3"
    volumes:
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
    expose: ["2379", "9100"]
    ports:
      - "2392:2379"
      - "9102:9100"
    depends_on:
      meta-root-1: { condition: service_started }
      meta-root-2: { condition: service_started }
      meta-root-3: { condition: service_started }

  # ============= EXECUTION PLANE: 3× store =============
  store-1:
    <<: *common
    container_name: nokv-store-1
    entrypoint: ["/usr/local/bin/serve-store.sh"]
    command:
      - "--config"
      - "/etc/nokv/raft_config.json"
      - "--store-id"
      - "1"
      - "--workdir"
      - "/var/lib/nokv/store"
      - "--scope"
      - "docker"
      - "--coordinator-addr"
      - "nokv-coordinator-1:2379,nokv-coordinator-2:2379,nokv-coordinator-3:2379"
      - "--extra"
      - "--metrics-addr=0.0.0.0:9200"
    volumes:
      - store1-data:/var/lib/nokv/store
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
    expose: ["20160", "9200"]
    ports:
      - "9200:9200"   # expvar
    depends_on:
      bootstrap: { condition: service_completed_successfully }
      coordinator-1: { condition: service_started }

  store-2:
    <<: *common
    container_name: nokv-store-2
    entrypoint: ["/usr/local/bin/serve-store.sh"]
    command:
      - "--config"
      - "/etc/nokv/raft_config.json"
      - "--store-id"
      - "2"
      - "--workdir"
      - "/var/lib/nokv/store"
      - "--scope"
      - "docker"
      - "--coordinator-addr"
      - "nokv-coordinator-1:2379,nokv-coordinator-2:2379,nokv-coordinator-3:2379"
      - "--extra"
      - "--metrics-addr=0.0.0.0:9200"
    volumes:
      - store2-data:/var/lib/nokv/store
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
    expose: ["20160", "9200"]
    ports:
      - "9201:9200"
    depends_on:
      bootstrap: { condition: service_completed_successfully }
      coordinator-1: { condition: service_started }

  store-3:
    <<: *common
    container_name: nokv-store-3
    entrypoint: ["/usr/local/bin/serve-store.sh"]
    command:
      - "--config"
      - "/etc/nokv/raft_config.json"
      - "--store-id"
      - "3"
      - "--workdir"
      - "/var/lib/nokv/store"
      - "--scope"
      - "docker"
      - "--coordinator-addr"
      - "nokv-coordinator-1:2379,nokv-coordinator-2:2379,nokv-coordinator-3:2379"
      - "--extra"
      - "--metrics-addr=0.0.0.0:9200"
    volumes:
      - store3-data:/var/lib/nokv/store
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
    expose: ["20160", "9200"]
    ports:
      - "9202:9200"
    depends_on:
      bootstrap: { condition: service_completed_successfully }
      coordinator-1: { condition: service_started }

  # ============= REDIS GATEWAY =============
  redis:
    <<: *common
    container_name: nokv-redis
    entrypoint: ["/usr/local/bin/nokv-redis"]
    command:
      - "--addr=0.0.0.0:6380"
      - "--raft-config=/etc/nokv/raft_config.json"
      - "--addr-scope=docker"
      - "--coordinator-addr=nokv-coordinator-1:2379,nokv-coordinator-2:2379,nokv-coordinator-3:2379"
      - "--metrics-addr=0.0.0.0:9300"
    volumes:
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
    ports:
      - "6380:6380"   # RESP gateway — redis-cli -p 6380
      - "9300:9300"   # expvar
    expose: ["9300"]
    depends_on:
      store-1: { condition: service_started }
      store-2: { condition: service_started }
      store-3: { condition: service_started }
      coordinator-1: { condition: service_started }

  mount-init:
    <<: *common
    container_name: nokv-mount-init
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      until /usr/local/bin/nokv mount register
      --coordinator-addr nokv-coordinator-1:2379,nokv-coordinator-2:2379,nokv-coordinator-3:2379
      --mount default --root-inode 1 --schema-version 1; do sleep 1; done
    depends_on:
      coordinator-1: { condition: service_started }
      coordinator-2: { condition: service_started }
      coordinator-3: { condition: service_started }

  # ============= FSMETA GATEWAY =============
  fsmeta:
    <<: *common
    container_name: nokv-fsmeta
    entrypoint: ["/usr/local/bin/nokv-fsmeta"]
    command:
      - "--addr=0.0.0.0:8090"
      - "--coordinator-addr=nokv-coordinator-1:2379,nokv-coordinator-2:2379,nokv-coordinator-3:2379"
      - "--metrics-addr=0.0.0.0:9400"
    ports:
      - "8090:8090"   # FSMetadata gRPC
      - "9400:9400"   # expvar
    expose: ["8090", "9400"]
    depends_on:
      store-1: { condition: service_started }
      store-2: { condition: service_started }
      store-3: { condition: service_started }
      mount-init: { condition: service_completed_successfully }
      coordinator-1: { condition: service_started }

  # ============= CLOUDFLARE TUNNEL (optional) =============
  # Uncomment after `cloudflared tunnel create nokv-demo` and export the token:
  #   export CLOUDFLARE_TUNNEL_TOKEN=eyJh...
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: nokv-cloudflared
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     redis: { condition: service_started }

volumes:
  meta-root-1-data:
  meta-root-2-data:
  meta-root-3-data:
  store1-data:
  store2-data:
  store3-data:
