# Local fsmeta demo. The main product path in this repository is now fsmeta; the
# distributed Rust data plane is developed under raftstore and is not wired
# into the default Compose stack until its fsmeta runtime adapter is complete.

services:
  fsmeta:
    build: .
    image: ${NOKV_IMAGE:-ghcr.io/feichai0017/nokv:${NOKV_IMAGE_TAG:-latest}}
    container_name: nokv-fsmeta
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 30s
    entrypoint: ["/usr/local/bin/nokv-fsmeta"]
    command:
      - "--addr=0.0.0.0:8090"
      - "--metrics-addr=0.0.0.0:9400"
      - "--local-work-dir=/var/lib/nokv/fsmeta"
      - "--local-mount-id=${NOKV_FSMETA_MOUNT:-default}"
      - "--local-mount-key-id=${NOKV_FSMETA_MOUNT_KEY_ID:-1}"
      - "--local-root-inode=${NOKV_FSMETA_ROOT_INODE:-1}"
    volumes:
      - fsmeta-data:/var/lib/nokv/fsmeta
    ports:
      - "8090:8090"
      - "9400:9400"

volumes:
  fsmeta-data:
