# NoKV HA deployment: 3 meta-root + 3 coordinators + 3 stores + 1 fsmeta gateway.
# Every running service exposes /debug/vars and /debug/pprof on its diagnostics
# port for dashboards and benchmark profiling.
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down -v    # wipes data volumes too
#
# Local development build:
#   docker compose up -d --build
#
# Architecture:
#   Truth plane:     3× meta-root  (replicated raft, quorum of 2 — tolerates 1 peer loss)
#   Control plane:   3× coordinator (Eunomia grant-gated singleton; one active holder, two standby)
#   Execution plane: 3× store      (per-region raft, quorum of 2)
#   Gateway:         1× nokv-fsmeta (filesystem metadata gRPC)
#
# Clients (stores, gateway) dial all three coordinators as a comma-separated
# --coordinator-addr list. coordinator/client.GRPCClient parses that list,
# keeps a preferred endpoint, and transparently fails over to another
# coordinator on FailedPrecondition "coordinator grant not held" / "coordinator
# not leader" errors. If the active grant holder dies, the next
# write retries and lands on whichever standby has grabbed the grant.
#
# Every runtime binary (coordinator, store, fsmeta, meta-root) exposes expvar
# at /debug/vars and pprof at /debug/pprof via its own --metrics-addr flag;
# ports 9380-9382 belong to the three meta-root peers.

x-nokv-image: &nokv-image
  build: .
  image: ${NOKV_IMAGE:-ghcr.io/feichai0017/nokv:${NOKV_IMAGE_TAG:-latest}}
  # Compose is a local dev/test deployment. The seed is intentionally public
  # and only keeps all local containers on one Eunomia grant key; production
  # deployments must provide their own signing and verification keys.
  environment:
    NOKV_EUNOMIA_GRANT_SIGNING_PRIVATE_KEY: "${NOKV_EUNOMIA_GRANT_SIGNING_PRIVATE_KEY:-rM0DUr4noWKwu7NlAoX2A6FXpdUyLESmwvqNYOkeNIc=}"

x-common: &common
  image: ${NOKV_IMAGE:-ghcr.io/feichai0017/nokv:${NOKV_IMAGE_TAG:-latest}}
  restart: unless-stopped
  stop_signal: SIGINT
  stop_grace_period: 30s
  # Compose is a local dev/test deployment. The seed is intentionally public
  # and only keeps all local containers on one Eunomia grant key; production
  # deployments must provide their own signing and verification keys.
  environment:
    NOKV_EUNOMIA_GRANT_SIGNING_PRIVATE_KEY: "${NOKV_EUNOMIA_GRANT_SIGNING_PRIVATE_KEY:-rM0DUr4noWKwu7NlAoX2A6FXpdUyLESmwvqNYOkeNIc=}"

services:
  # ---------- bootstrap (seed stores once, then exit) ----------
  bootstrap:
    <<: *nokv-image
    container_name: nokv-bootstrap
    entrypoint: ["/usr/local/bin/bootstrap.sh"]
    command:
      - "--config"
      - "/etc/nokv/raft_config.json"
      - "--path-template"
      - "/volumes/store-{id}"
      - "--skip-existing"
    volumes:
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
      - store1-data:/volumes/store-1
      - store2-data:/volumes/store-2
      - store3-data:/volumes/store-3
    restart: "no"

  # ============= TRUTH PLANE: 3× meta-root (raft quorum) =============
  meta-root-1:
    <<: *common
    container_name: nokv-meta-root-1
    entrypoint: ["/usr/local/bin/nokv"]
    command:
      - "meta-root"
      - "--config=/etc/nokv/raft_config.json"
      - "--scope=docker"
      - "--node-id=1"
      - "--addr=0.0.0.0:2380"
      - "--metrics-addr=0.0.0.0:9380"
    volumes:
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
      - meta-root-1-data:/var/lib/nokv-meta-root
    expose: ["2380", "2480", "9380"]
    ports:
      - "2380:2380"   # gRPC service (coord / host-side audit tools dial here)
      - "9380:9380"   # expvar dashboard

  meta-root-2:
    <<: *common
    container_name: nokv-meta-root-2
    entrypoint: ["/usr/local/bin/nokv"]
    command:
      - "meta-root"
      - "--config=/etc/nokv/raft_config.json"
      - "--scope=docker"
      - "--node-id=2"
      - "--addr=0.0.0.0:2380"
      - "--metrics-addr=0.0.0.0:9380"
    volumes:
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
      - meta-root-2-data:/var/lib/nokv-meta-root
    expose: ["2380", "2480", "9380"]
    ports:
      - "2381:2380"
      - "9381:9380"

  meta-root-3:
    <<: *common
    container_name: nokv-meta-root-3
    entrypoint: ["/usr/local/bin/nokv"]
    command:
      - "meta-root"
      - "--config=/etc/nokv/raft_config.json"
      - "--scope=docker"
      - "--node-id=3"
      - "--addr=0.0.0.0:2380"
      - "--metrics-addr=0.0.0.0:9380"
    volumes:
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
      - meta-root-3-data:/var/lib/nokv-meta-root
    expose: ["2380", "2480", "9380"]
    ports:
      - "2382:2380"
      - "9382:9380"

  # ============= CONTROL PLANE: 3× coordinator (Eunomia grant HA) =============
  coordinator-1:
    <<: *common
    container_name: nokv-coordinator-1
    entrypoint: ["/usr/local/bin/nokv"]
    command:
      - "coordinator"
      - "--config=/etc/nokv/raft_config.json"
      - "--scope=docker"
      - "--addr=0.0.0.0:2379"
      - "--metrics-addr=0.0.0.0:9100"
      - "--coordinator-id=coord-1"
      - "--grant-candidates=coord-1,coord-2,coord-3"
      - "--grant-duties=alloc_id,tso,region_lookup"
      - "--grant-ttl=30s"
      - "--grant-renew-before=10s"
      - "--id-window-size=1000000"
      - "--tso-window-size=1000000"
    volumes:
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
    expose: ["2379", "9100"]
    ports:
      - "2390:2379"   # coordinator gRPC
      - "9100:9100"   # expvar
    depends_on:
      meta-root-1: { condition: service_started }
      meta-root-2: { condition: service_started }
      meta-root-3: { condition: service_started }

  coordinator-2:
    <<: *common
    container_name: nokv-coordinator-2
    entrypoint: ["/usr/local/bin/nokv"]
    command:
      - "coordinator"
      - "--config=/etc/nokv/raft_config.json"
      - "--scope=docker"
      - "--addr=0.0.0.0:2379"
      - "--metrics-addr=0.0.0.0:9100"
      - "--coordinator-id=coord-2"
      - "--grant-candidates=coord-1,coord-2,coord-3"
      - "--grant-duties=alloc_id,tso,region_lookup"
      - "--grant-ttl=30s"
      - "--grant-renew-before=10s"
      - "--id-window-size=1000000"
      - "--tso-window-size=1000000"
    volumes:
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
    expose: ["2379", "9100"]
    ports:
      - "2391:2379"
      - "9101:9100"
    depends_on:
      meta-root-1: { condition: service_started }
      meta-root-2: { condition: service_started }
      meta-root-3: { condition: service_started }

  coordinator-3:
    <<: *common
    container_name: nokv-coordinator-3
    entrypoint: ["/usr/local/bin/nokv"]
    command:
      - "coordinator"
      - "--config=/etc/nokv/raft_config.json"
      - "--scope=docker"
      - "--addr=0.0.0.0:2379"
      - "--metrics-addr=0.0.0.0:9100"
      - "--coordinator-id=coord-3"
      - "--grant-candidates=coord-1,coord-2,coord-3"
      - "--grant-duties=alloc_id,tso,region_lookup"
      - "--grant-ttl=30s"
      - "--grant-renew-before=10s"
      - "--id-window-size=1000000"
      - "--tso-window-size=1000000"
    volumes:
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
    expose: ["2379", "9100"]
    ports:
      - "2392:2379"
      - "9102:9100"
    depends_on:
      meta-root-1: { condition: service_started }
      meta-root-2: { condition: service_started }
      meta-root-3: { condition: service_started }

  # ============= EXECUTION PLANE: 3× store =============
  store-1:
    <<: *common
    container_name: nokv-store-1
    entrypoint: ["/usr/local/bin/serve-store.sh"]
    command:
      - "--config"
      - "/etc/nokv/raft_config.json"
      - "--store-id"
      - "1"
      - "--workdir"
      - "/var/lib/nokv/store"
      - "--scope"
      - "docker"
      - "--coordinator-addr"
      - "nokv-coordinator-1:2379,nokv-coordinator-2:2379,nokv-coordinator-3:2379"
      - "--extra"
      - "--metrics-addr=0.0.0.0:9200"
      - "--storage-max-batch-count=${NOKV_STORE_MAX_BATCH_COUNT:-1024}"
      - "--peras-witness-wal-policy=${NOKV_PERAS_WITNESS_WAL_POLICY:-fsync-batched}"
    volumes:
      - store1-data:/var/lib/nokv/store
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
    expose: ["20160", "9200"]
    ports:
      - "9200:9200"   # expvar
    depends_on:
      bootstrap: { condition: service_completed_successfully }
      coordinator-1: { condition: service_started }

  store-2:
    <<: *common
    container_name: nokv-store-2
    entrypoint: ["/usr/local/bin/serve-store.sh"]
    command:
      - "--config"
      - "/etc/nokv/raft_config.json"
      - "--store-id"
      - "2"
      - "--workdir"
      - "/var/lib/nokv/store"
      - "--scope"
      - "docker"
      - "--coordinator-addr"
      - "nokv-coordinator-1:2379,nokv-coordinator-2:2379,nokv-coordinator-3:2379"
      - "--extra"
      - "--metrics-addr=0.0.0.0:9200"
      - "--storage-max-batch-count=${NOKV_STORE_MAX_BATCH_COUNT:-1024}"
      - "--peras-witness-wal-policy=${NOKV_PERAS_WITNESS_WAL_POLICY:-fsync-batched}"
    volumes:
      - store2-data:/var/lib/nokv/store
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
    expose: ["20160", "9200"]
    ports:
      - "9201:9200"
    depends_on:
      bootstrap: { condition: service_completed_successfully }
      coordinator-1: { condition: service_started }

  store-3:
    <<: *common
    container_name: nokv-store-3
    entrypoint: ["/usr/local/bin/serve-store.sh"]
    command:
      - "--config"
      - "/etc/nokv/raft_config.json"
      - "--store-id"
      - "3"
      - "--workdir"
      - "/var/lib/nokv/store"
      - "--scope"
      - "docker"
      - "--coordinator-addr"
      - "nokv-coordinator-1:2379,nokv-coordinator-2:2379,nokv-coordinator-3:2379"
      - "--extra"
      - "--metrics-addr=0.0.0.0:9200"
      - "--storage-max-batch-count=${NOKV_STORE_MAX_BATCH_COUNT:-1024}"
      - "--peras-witness-wal-policy=${NOKV_PERAS_WITNESS_WAL_POLICY:-fsync-batched}"
    volumes:
      - store3-data:/var/lib/nokv/store
      - ./raft_config.example.json:/etc/nokv/raft_config.json:ro
    expose: ["20160", "9200"]
    ports:
      - "9202:9200"
    depends_on:
      bootstrap: { condition: service_completed_successfully }
      coordinator-1: { condition: service_started }

  mount-init:
    <<: *common
    container_name: nokv-mount-init
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for mount in $(printf '%s' "${NOKV_MOUNT_IDS:-default}" | tr ',' ' '); do
          mount_key_id=
          for pair in $(printf '%s' "${NOKV_MOUNT_KEY_IDS:-default=1,fsmeta-bench=2}" | tr ',' ' '); do
            case "$$pair" in
              "$$mount="*) mount_key_id="$${pair#*=}" ;;
            esac
          done
          if [ -z "$$mount_key_id" ]; then
            echo "missing mount_key_id mapping for $$mount in NOKV_MOUNT_KEY_IDS" >&2
            exit 1
          fi
          mount_key_arg="--mount-key-id $$mount_key_id"
          until /usr/local/bin/nokv mount register \
            --coordinator-addr nokv-coordinator-1:2379,nokv-coordinator-2:2379,nokv-coordinator-3:2379 \
            --mount "$$mount" $$mount_key_arg --root-inode 1 --schema-version 1; do
            sleep 1
          done
        done
    depends_on:
      coordinator-1: { condition: service_started }
      coordinator-2: { condition: service_started }
      coordinator-3: { condition: service_started }

  # ============= FSMETA GATEWAY =============
  fsmeta:
    <<: *common
    container_name: nokv-fsmeta
    entrypoint: ["/usr/local/bin/nokv-fsmeta"]
    command:
      - "--addr=0.0.0.0:8090"
      - "--coordinator-addr=nokv-coordinator-1:2379,nokv-coordinator-2:2379,nokv-coordinator-3:2379"
      - "--affinity-buckets=16"
      - "--metrics-addr=0.0.0.0:9400"
      - "--peras-holder-id=${NOKV_FSMETA_PERAS_HOLDER_ID:-fsmeta-compose-holder}"
      - "--peras-authority-ttl=${NOKV_FSMETA_PERAS_AUTHORITY_TTL:-5m}"
      - "--peras-witness-stores=${NOKV_FSMETA_PERAS_WITNESS_STORES:-1,2,3}"
      - "--peras-witness-quorum=${NOKV_FSMETA_PERAS_WITNESS_QUORUM:-2}"
      - "--peras-segment-witness-retries=${NOKV_FSMETA_PERAS_SEGMENT_WITNESS_RETRIES:-50}"
      - "--peras-segment-witness-retry-backoff=${NOKV_FSMETA_PERAS_SEGMENT_WITNESS_RETRY_BACKOFF:-20ms}"
      - "--peras-segment-batch-size=${NOKV_FSMETA_PERAS_SEGMENT_BATCH_SIZE:-512}"
      - "--peras-admission-pending-limit=${NOKV_FSMETA_PERAS_ADMISSION_PENDING_LIMIT:-0}"
      - "--peras-segment-max-replay-mutations=${NOKV_FSMETA_PERAS_SEGMENT_MAX_REPLAY_MUTATIONS:-4096}"
      - "--peras-segment-catalog-route-budget=${NOKV_FSMETA_PERAS_SEGMENT_CATALOG_ROUTE_BUDGET:-4}"
      - "--peras-segment-install-parallelism=${NOKV_FSMETA_PERAS_SEGMENT_INSTALL_PARALLELISM:-0}"
      - "--peras-segment-flush-parallelism=${NOKV_FSMETA_PERAS_SEGMENT_FLUSH_PARALLELISM:-0}"
      - "--peras-segment-flush-every=${NOKV_FSMETA_PERAS_SEGMENT_FLUSH_EVERY:-20ms}"
      - "--peras-background-flush-timeout=${NOKV_FSMETA_PERAS_BACKGROUND_FLUSH_TIMEOUT:-30s}"
      - "--peras-background-error-backoff=${NOKV_FSMETA_PERAS_BACKGROUND_ERROR_BACKOFF:-1s}"
      - "--peras-visible-log-dir=/var/lib/nokv/peras-visible-log"
      - "--peras-visible-log-policy=${NOKV_FSMETA_PERAS_VISIBLE_LOG_POLICY:-flushed}"
    volumes:
      - fsmeta-peras-visible-log:/var/lib/nokv/peras-visible-log
    ports:
      - "8090:8090"   # FSMetadata gRPC
      - "9400:9400"   # expvar
    expose: ["8090", "9400"]
    depends_on:
      store-1: { condition: service_started }
      store-2: { condition: service_started }
      store-3: { condition: service_started }
      mount-init: { condition: service_completed_successfully }
      coordinator-1: { condition: service_started }

  # ============= CLOUDFLARE TUNNEL (optional) =============
  # Uncomment after `cloudflared tunnel create nokv-demo` and export the token:
  #   export CLOUDFLARE_TUNNEL_TOKEN=eyJh...
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: nokv-cloudflared
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     fsmeta: { condition: service_started }

volumes:
  meta-root-1-data:
  meta-root-2-data:
  meta-root-3-data:
  store1-data:
  store2-data:
  store3-data:
  fsmeta-peras-visible-log:
