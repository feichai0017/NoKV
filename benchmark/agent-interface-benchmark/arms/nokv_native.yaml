arm_id: nokv_native_v1
version: 1
interface_name: NoKV Native Namespace
mode: warm_interface
purpose: Native NoKV namespace SDK/service interface over the fixed Yanex corpus stored in NoKV.

data_scope:
  corpus: yanex_experiment_metadata_origami_data_gen_project
  visibility: nokv_native_namespace
  mutation: read_only_for_benchmark

tool_contract:
  - name: list
    purpose: List children for a NoKV path using ReadDirPlus-style namespace metadata.
    arguments:
      path: string
    returns: Child entries with path, file type, inode, size, generation, and body descriptor when present.
  - name: stat
    purpose: Return NoKV metadata for a path without reading the body.
    arguments:
      path: string
    returns: File type, inode, size, mode, timestamps, generation, body descriptor, and stable path evidence.
  - name: read
    purpose: Read a NoKV file body or byte range.
    arguments:
      path: string
      offset: integer
      limit: integer
      expected_generation: integer
    returns: Body range plus the generation and body descriptor used for the read.
    constraints:
      - expected_generation may be omitted when generation stability is not required.
      - If expected_generation is supplied and the current path generation differs, the tool must return a generation mismatch instead of reading.

namespace_layout:
  root: /yanex/
  runs: /yanex/runs/{experiment_id}/
  metadata: /yanex/runs/{experiment_id}/metadata.json
  params: /yanex/runs/{experiment_id}/params.yaml
  metrics: /yanex/runs/{experiment_id}/metrics.json
  dependencies: /yanex/runs/{experiment_id}/dependencies.json
  artifacts: /yanex/runs/{experiment_id}/artifacts/
  indexes:
    experiments: /yanex/index/experiments.json
    statuses: /yanex/index/status/{status}.json
    tags: /yanex/index/tags/{tag}.json
    scripts: /yanex/index/scripts/{script_name}.json

nokv_metadata:
  stable_fields:
    - path
    - file_type
    - inode
    - size_bytes
    - mode
    - generation
    - body_descriptor
    - digest_uri
    - manifest_id
    - content_type
  consistency:
    - A path plus generation identifies the inspected live namespace version.
    - Snapshot id plus path identifies a pinned namespace read.
    - Body descriptors are metadata summaries, not file content.

evidence_conventions:
  experiment: nokv-native:///yanex/runs/{experiment_id}/metadata.json@generation:{generation}
  param: nokv-native:///yanex/runs/{experiment_id}/params.yaml@generation:{generation}#{param_path}
  metric: nokv-native:///yanex/runs/{experiment_id}/metrics.json@generation:{generation}#{metric_name}
  dependency: nokv-native:///yanex/runs/{experiment_id}/dependencies.json@generation:{generation}
  artifact: nokv-native:///yanex/runs/{experiment_id}/artifacts/{artifact_path}@generation:{generation}
  index: nokv-native:///{index_path}@generation:{generation}

interface_guidance:
  - Use list/stat metadata to avoid reading unnecessary object bodies.
  - Include generation in evidence when live path metadata is used.
  - Use expected_generation on read when generation stability matters.
  - Keep broad discovery generic: use indexes or namespace traversal, not semantic handle search.

forbidden_assumptions:
  - Do not use semantic handles such as run://, metric://, lineage://, or git:// in this arm.
  - Do not assume two reads of the same path saw the same object unless generation matches.
  - Do not treat a body descriptor as human-readable content without calling read.
  - Do not use task-specific helper operations such as find_best_run.

example_paths:
  - /yanex/runs/00023013/metadata.json
  - /yanex/runs/00023013/metrics.json
  - /yanex/index/tags/sweep.json
