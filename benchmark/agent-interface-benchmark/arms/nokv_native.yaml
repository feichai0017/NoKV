arm_id: nokv_native_v1
version: 1
interface_name: NoKV Product Native Agent API
mode: warm_interface
purpose: Product-native read-only namespace access.

runtime_context:
  surface: nokv_native_namespace
  entrypoint: /yanex
  access: read_only
  path_model:
    - Paths are absolute NoKV namespace paths.
    - Start at /yanex and discover child search roots from returned cards or catalogs.
    - Do not assume a path exists until a returned result names it.
  field_discovery:
    - Use only field ids returned by stat or catalog for the current search root.
    - If a catalog is empty, use returned child_catalogs as candidate search roots.
  tool_roles:
    - Resolve run cohorts, statuses, scripts, params, metrics, artifacts, and git facts with catalog plus find or aggregate first; these indexed fields answer run-level questions without body access.
    - Use catalog to discover field ids; request facets only when value distributions are needed.
    - Use find to search paths, filter on indexed fields, sort, and project values. Push predicates, sort, and limit into the call; do not paginate results to sort or rank on the client.
    - Use aggregate for counts, groups, and summary measures.
    - Use grep only for text that lives inside log or artifact bodies. grep matches a case-insensitive literal substring and returns every matching line with its line number; scope it to one run directory or file once the cohort is known.
    - Trust returned results; do not re-verify find matches with per-run stat or read, and do not re-read bodies to confirm grep matches.
    - Use ls to discover direct child paths and stat for one path's compact card.
    - Use read only when the task requires file body content that grep cannot return as matching lines.
  safety:
    - Do not invent field ids or paths.
    - Do not treat body descriptors as file content.
    - Do not treat file size as record count.
