arm_id: nokv_posix_v1
version: 1
interface_name: NoKV POSIX FUSE
mode: warm_interface
purpose: POSIX-shaped read-only FUSE view over the NoKV Yanex corpus.

data_scope:
  corpus: yanex_experiment_metadata_origami_data_gen_project
  visibility: nokv_fuse_namespace
  mutation: read_only_for_benchmark

tool_contract:
  - name: ls
    purpose: List mounted NoKV directory entries through POSIX metadata.
    arguments:
      path: string
    returns: Entries with path, type, size, mode, and timestamps when available.
  - name: stat
    purpose: Return POSIX metadata for a mounted NoKV path without reading the body.
    arguments:
      path: string
    returns: File type, size, mode, ownership, timestamps, and path evidence.
  - name: read
    purpose: Read a byte range from a mounted NoKV file.
    arguments:
      path: string
      offset: integer
      limit: integer
    returns: Byte range and path evidence.
  - name: grep
    purpose: Search mounted text files by substring pattern.
    arguments:
      path: string
      pattern: string
      recursive: boolean
    returns: Matching file snippets, bytes read, and truncation state.
  - name: find
    purpose: Find mounted paths by name or wildcard-like pattern.
    arguments:
      path: string
      pattern: string
    returns: Matching POSIX entries.

namespace_layout:
  root: /yanex/
  runs: /yanex/runs/{experiment_id}/
  metadata: /yanex/runs/{experiment_id}/metadata.json
  params: /yanex/runs/{experiment_id}/params.yaml
  metrics: /yanex/runs/{experiment_id}/metrics.json
  dependencies: /yanex/runs/{experiment_id}/dependencies.json
  artifacts: /yanex/runs/{experiment_id}/artifacts/
  indexes: /yanex/index/

evidence_conventions:
  path: nokv-fuse://{path}

interface_guidance:
  - Use stat to avoid reading large stderr/stdout or artifact bodies.
  - Use find/grep for discovery, but keep recursive scans bounded.
  - Treat POSIX metadata as a mounted view, not as NoKV generation metadata.

forbidden_assumptions:
  - Do not assume POSIX paths expose NoKV generation or snapshot ids.
  - Do not assume file size is record count.
  - Do not use NoKV native evidence handles in this arm.
