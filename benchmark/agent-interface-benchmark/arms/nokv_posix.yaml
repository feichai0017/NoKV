arm_id: nokv_posix_v1
version: 1
interface_name: NoKV POSIX FUSE
mode: warm_interface
purpose: POSIX-style inspection of the same Yanex corpus through the NoKV FUSE frontend.

data_scope:
  corpus: yanex_experiment_metadata_origami_data_gen_project
  visibility: nokv_fuse_mount
  mutation: read_only

tool_contract:
  - name: ls
    purpose: List directory entries through the mounted NoKV FUSE view.
    arguments:
      path: string
    returns: Entry names with POSIX-visible type, size, inode, mode, and modified time when available.
  - name: stat
    purpose: Return POSIX-visible metadata for a file or directory.
    arguments:
      path: string
    returns: Type, size, inode, mode, uid, gid, and timestamps when available.
  - name: read
    purpose: Read a file or byte range through the FUSE view.
    arguments:
      path: string
      offset: integer
      limit: integer
    returns: File content range plus path evidence.
  - name: grep
    purpose: Search text files by pattern under the mounted NoKV FUSE view.
    arguments:
      path: string
      pattern: string
      recursive: boolean
    returns: Matching path, line, and snippet records.
  - name: find
    purpose: Find paths by name or glob pattern under the mounted NoKV FUSE view.
    arguments:
      path: string
      pattern: string
    returns: Matching paths with POSIX-visible metadata.

namespace_layout:
  root: /yanex/
  runs: /yanex/runs/{experiment_id}/
  metadata: /yanex/runs/{experiment_id}/metadata.json
  params: /yanex/runs/{experiment_id}/params.yaml
  metrics: /yanex/runs/{experiment_id}/metrics.json
  dependencies: /yanex/runs/{experiment_id}/dependencies.json
  artifacts: /yanex/runs/{experiment_id}/artifacts/
  indexes:
    experiments: /yanex/index/experiments.json
    statuses: /yanex/index/status/{status}.json
    tags: /yanex/index/tags/{tag}.json
    scripts: /yanex/index/scripts/{script_name}.json

posix_metadata:
  stable_fields:
    - path
    - file_type
    - size_bytes
    - inode
    - mode
    - uid
    - gid
    - mtime
  not_exposed:
    - body_descriptor
    - body_ref
    - digest_uri
    - manifest_id
    - metadata_generation
    - snapshot_id
    - watch_cursor

evidence_conventions:
  experiment: nokv-fuse:///yanex/runs/{experiment_id}/metadata.json
  param: nokv-fuse:///yanex/runs/{experiment_id}/params.yaml#{param_path}
  metric: nokv-fuse:///yanex/runs/{experiment_id}/metrics.json#{metric_name}
  dependency: nokv-fuse:///yanex/runs/{experiment_id}/dependencies.json
  artifact: nokv-fuse:///yanex/runs/{experiment_id}/artifacts/{artifact_path}
  index: nokv-fuse:///{index_path}

interface_guidance:
  - Use /yanex/index files for broad scans when they exist.
  - Use stat before reading large files or artifact directories.
  - Preserve exact paths in evidence because paths are the stable identifiers for this arm.
  - Treat this arm as a filesystem projection. Do not claim NoKV-native body metadata unless another exposed tool returns it.

forbidden_assumptions:
  - Do not use NoKV native SDK fields such as body_ref, digest_uri, manifest_id, generation, snapshot, or watch cursor in this arm.
  - Do not use semantic handle syntax in this arm.
  - Do not assume directory ordering has semantic meaning.

example_paths:
  - /yanex/runs/00023013/metadata.json
  - /yanex/runs/00023013/metrics.json
  - /yanex/index/tags/sweep.json
