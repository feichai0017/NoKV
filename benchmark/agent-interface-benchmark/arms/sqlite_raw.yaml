arm_id: sqlite_raw_v1
version: 1
interface_name: Raw SQLite
mode: warm_interface
purpose: Raw relational SQLite interface over the fixed Yanex corpus snapshot.

data_scope:
  corpus: yanex_experiment_metadata_origami_data_gen_project
  visibility: all_experiments_and_declared_artifacts
  mutation: read_only

tool_contract:
  - name: show_schema
    purpose: Return table names, columns, types, indexes, and documented relationships.
    arguments: {}
    returns: SQL schema text plus stable table references.
  - name: query_sql
    purpose: Execute a read-only SQLite query.
    arguments:
      sql: string
    returns: Rows plus stable evidence references for row origins.
    constraints:
      - Only SELECT, WITH, and EXPLAIN-style read-only statements are allowed.
      - The harness may enforce row and byte limits.
      - Queries must not attach other databases or call write-affecting pragmas.
  - name: read_blob
    purpose: Read large artifact or text bodies referenced by SQL rows.
    arguments:
      blob_ref: string
      offset: integer
      limit: integer
    returns: Byte range plus blob metadata.

logical_schema:
  experiments:
    primary_key: experiment_id
    columns:
      - experiment_id
      - name
      - status
      - project
      - script_path
      - command
      - created_at
      - started_at
      - completed_at
      - duration
      - tags_json
      - metadata_json
  params:
    key: experiment_id, param_path
    columns:
      - experiment_id
      - param_path
      - value_json
      - value_type
  metrics:
    key: experiment_id, metric_name, step
    columns:
      - experiment_id
      - metric_name
      - step
      - value
      - timestamp
  dependencies:
    key: experiment_id, dependency_experiment_id, relation
    columns:
      - experiment_id
      - dependency_experiment_id
      - relation
      - status_at_resolution
      - metadata_json
  artifacts:
    key: experiment_id, artifact_path
    columns:
      - experiment_id
      - artifact_path
      - artifact_type
      - size_bytes
      - digest
      - blob_ref
      - exists
  git_state:
    key: experiment_id
    columns:
      - experiment_id
      - commit
      - branch
      - dirty
      - patch_file
      - diff_blob_ref

evidence_conventions:
  experiment: sqlite://experiments/{experiment_id}
  param: sqlite://params/{experiment_id}/{param_path}
  metric: sqlite://metrics/{experiment_id}/{metric_name}/{step}
  dependency: sqlite://dependencies/{experiment_id}/{dependency_experiment_id}/{relation}
  artifact: sqlite://artifacts/{experiment_id}/{artifact_path}
  blob: sqlite://blobs/{blob_ref}

interface_guidance:
  - Use SQL predicates, grouping, sorting, and joins for structured comparisons across many experiments.
  - Use read_blob only after query_sql identifies the artifact or diff body needed as evidence.
  - Prefer narrow projections over SELECT * when answering a targeted task.
  - Treat NULL, missing rows, and exists=false as different states.

forbidden_assumptions:
  - Do not infer an artifact exists only because metadata references it.
  - Do not assume git diffs are available when git_state.dirty is true.
  - Do not treat a missing metric step as zero.

example_queries:
  - description: Count experiments by status.
    sql: SELECT status, COUNT(*) AS n FROM experiments GROUP BY status ORDER BY n DESC;
  - description: Find best completed run for a metric.
    sql: |
      SELECT e.experiment_id, m.value
      FROM experiments e
      JOIN metrics m ON e.experiment_id = m.experiment_id
      WHERE e.status = 'completed' AND m.metric_name = :metric
      ORDER BY m.value DESC
      LIMIT 5;
