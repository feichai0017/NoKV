arm_id: sqlite_raw_v1
version: 1
interface_name: Raw SQLite
mode: warm_interface
purpose: Read-only relational access over the current experiment corpus.

runtime_context:
  surface: sqlite_database
  access: read_only
  schema_discovery:
    - Inspect the live schema before writing non-trivial SQL.
    - Use discovered table and column names; do not assume undocumented schema fields.
  query_safety:
    - Use bounded read-only SQL.
    - Do not mutate the database.
  blob_reads:
    - Read blobs only from blob_ref values returned by query results.
    - Do not read blob bodies when metadata rows already answer the task.
  notice:
    - For metric REAL columns, non-finite values may be stored as SQLite +/-Inf and value_json may contain "Infinity"; when a task requires finite metrics, filter with value > -9.0e+999 AND value < 9.0e+999, or an equivalent finite numeric bound.
