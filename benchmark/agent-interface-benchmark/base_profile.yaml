profile_id: yanex_agent_benchmark_base_v1
version: 1
mode: warm_interface
api_surface: openai_agents_responses_schema_once

model:
  temperature: 1
  max_completion_tokens: 4096
  stream: false
  structured_output: true

run_policy:
  stateless: true
  repeats_per_arm_task: 10
  max_turns: 20
  max_tool_calls: 80
  tool_call_timeout_ms: 60000
  retry_policy: no_auto_success_retry
  clear_messages_after_run: true
  corpus_snapshot: fixed_per_benchmark_batch

base_system_message: |
  You are an experiment tracking analysis agent working over a Yanex experiment corpus.
  You must solve the requested task using only the interface tools exposed for the current benchmark arm.
  Treat every run as stateless. Do not assume memory from previous tasks, previous arms, or previous attempts.
  Prefer small, evidence-directed reads. Inspect schema, listings, metadata, or summaries before reading large bodies.
  Do not guess missing values. If evidence is absent, inconsistent, or ambiguous, report that explicitly.
  Cite concrete evidence handles or paths for every factual claim that affects the final answer.
  Keep tool use bounded and stop as soon as the answer is sufficiently supported.

base_developer_message: |
  Output exactly one JSON object matching the benchmark schema.
  Do not include markdown outside the JSON object.
  Required top-level keys: task_id, status, answer, run_ids, evidence, missing_evidence, operations_summary, confidence.
  status must be one of "success", "partial", "failed", or "blocked".
  evidence must be an array of objects with stable handle and claim fields.
  missing_evidence must be an array of strings.
  operations_summary must include tool_call_count and bytes_read_estimate.
  confidence must be one of "high", "medium", or "low".
  If the interface cannot support a requested operation, set status to "blocked" or "partial" and explain the missing capability.
  Evidence handles must be stable identifiers returned by the current arm's tools.

output_schema:
  type: object
  required:
    - task_id
    - status
    - answer
    - evidence
    - missing_evidence
    - operations_summary
    - confidence
  properties:
    task_id:
      type: string
    status:
      type: string
      enum:
        - success
        - partial
        - failed
        - blocked
    answer:
      type:
        - object
        - array
        - string
        - number
        - boolean
        - "null"
    run_ids:
      type: array
      items:
        type: string
    evidence:
      type: array
      items:
        type: object
        required:
          - handle
          - claim
        properties:
          type:
            type: string
          handle:
            type: string
          value:
            type:
              - string
              - number
              - boolean
              - object
              - array
              - "null"
          claim:
            type: string
    missing_evidence:
      type: array
      items:
        type: string
    operations_summary:
      type: object
      properties:
        tool_call_count:
          type: integer
        bytes_read_estimate:
          type: integer
        notes:
          type: string
    confidence:
      type: string
      enum:
        - high
        - medium
        - low

telemetry_contract:
  record_types:
    - tool_call_start
    - benchmark_run
  capture_per_api_call:
    - request_id
    - response_id
    - previous_response_id
    - sent_tool_schema
    - sent_initial_instructions
    - model
    - started_at
    - completed_at
    - prompt_tokens
    - completion_tokens
    - total_tokens
    - reasoning_tokens
    - cached_prompt_tokens
    - accepted_prediction_tokens
    - rejected_prediction_tokens
  capture_per_tool_call:
    - call_id
    - tool_name
    - arguments
    - started_at
    - completed_at
    - status
    - bytes_read
    - result_token_estimate
    - error
    - timed_out
  derived_metrics:
    - interface_card_tokens
    - task_prompt_tokens
    - execution_cost_usd
    - all_in_cost_usd
    - wall_time_ms
    - task_success
    - evidence_precision
    - invalid_sql_count
    - wrong_tool_count
    - tool_schema_repeated_count
    - tool_timeout_count
    - missing_evidence_count
    - overread_bytes
