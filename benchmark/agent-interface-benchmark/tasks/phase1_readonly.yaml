task_set_id: yanex_phase1_readonly_research_v3
version: 4
scope: read_only_agent_interface
tasks:
  - task_id: train_top_configs_report
    category: sweep_summary
    prompt: |
      You are summarizing our origami training sweep for the team. Among completed train.py runs, find the 5 runs with the lowest minimum val_loss; ignore non-finite val_loss values. For each run report its learning rate, batch size, minimum val_loss, stdout.txt size in bytes, and whether the run had a dirty git state.

      Required answer shape:
      {
        "runs": [{
          "experiment_id": string,
          "learning_rate": string,
          "batch_size": string,
          "min_val_loss": number,
          "stdout_size_bytes": integer,
          "git_dirty": boolean
        }]
      }
      Sort by min_val_loss ascending, then experiment_id ascending. Return learning_rate and batch_size as strings.
    gold_sql: |
      WITH run_min AS (
        SELECT e.experiment_id, MIN(m.value) AS min_val_loss
        FROM experiments e
        JOIN metrics m ON e.experiment_id = m.experiment_id
        WHERE e.status = 'completed'
          AND e.script_path = 'train.py'
          AND m.metric_name = 'val_loss'
          AND m.value IS NOT NULL
          AND m.value > -9.0e+999
          AND m.value < 9.0e+999
        GROUP BY e.experiment_id
      )
      SELECT
        r.experiment_id,
        lr.value_json AS learning_rate,
        bs.value_json AS batch_size,
        r.min_val_loss,
        (SELECT a.size_bytes FROM artifacts a
          WHERE a.experiment_id = r.experiment_id
            AND a.artifact_path = 'stdout.txt'
            AND a."exists" = 1) AS stdout_size_bytes,
        g.dirty AS git_dirty
      FROM run_min r
      JOIN params lr ON lr.experiment_id = r.experiment_id
        AND lr.param_path = 'origami.training.learning_rate'
      JOIN params bs ON bs.experiment_id = r.experiment_id
        AND bs.param_path = 'origami.training.batch_size'
      LEFT JOIN git_state g ON g.experiment_id = r.experiment_id
      ORDER BY r.min_val_loss ASC, r.experiment_id ASC
      LIMIT 5;
    expected:
      kind: rows_exact
      answer_key: runs
      run_id_column: experiment_id
      columns:
        - experiment_id
        - learning_rate
        - batch_size
        - min_val_loss
        - stdout_size_bytes
        - git_dirty
  - task_id: eval_fidelity_leaderboard
    category: quality_leaderboard
    prompt: |
      We are picking the synthetic-data quality winners for the project report. Among completed eval.py runs, find the 5 runs with the highest latest fidelity. For each run report the latest utility_tstr_roc_auc, detection_roc_auc, and privacy_dcr_score when present, plus the stderr.txt size in bytes.

      Required answer shape:
      {
        "runs": [{
          "experiment_id": string,
          "fidelity": number,
          "utility_tstr_roc_auc": number|null,
          "detection_roc_auc": number|null,
          "privacy_dcr_score": number|null,
          "stderr_size_bytes": integer|null
        }]
      }
      Sort by fidelity descending, then experiment_id ascending. Use null for values that are not present.
    gold_sql: |
      WITH latest AS (
        SELECT experiment_id, metric_name, value
        FROM metrics
        WHERE metric_name IN (
          'fidelity',
          'utility_tstr_roc_auc',
          'detection_roc_auc',
          'privacy_dcr_score'
        )
        AND value IS NOT NULL
        AND value > -9.0e+999
        AND value < 9.0e+999
        GROUP BY experiment_id, metric_name
        HAVING step = MAX(step)
      ),
      top AS (
        SELECT e.experiment_id, l.value AS fidelity
        FROM experiments e
        JOIN latest l ON l.experiment_id = e.experiment_id
          AND l.metric_name = 'fidelity'
        WHERE e.status = 'completed'
          AND e.script_path = 'eval.py'
        ORDER BY l.value DESC, e.experiment_id ASC
        LIMIT 5
      )
      SELECT
        t.experiment_id,
        t.fidelity,
        ut.value AS utility_tstr_roc_auc,
        det.value AS detection_roc_auc,
        pr.value AS privacy_dcr_score,
        (SELECT a.size_bytes FROM artifacts a
          WHERE a.experiment_id = t.experiment_id
            AND a.artifact_path = 'stderr.txt'
            AND a."exists" = 1) AS stderr_size_bytes
      FROM top t
      LEFT JOIN latest ut ON ut.experiment_id = t.experiment_id
        AND ut.metric_name = 'utility_tstr_roc_auc'
      LEFT JOIN latest det ON det.experiment_id = t.experiment_id
        AND det.metric_name = 'detection_roc_auc'
      LEFT JOIN latest pr ON pr.experiment_id = t.experiment_id
        AND pr.metric_name = 'privacy_dcr_score'
      ORDER BY t.fidelity DESC, t.experiment_id ASC;
    expected:
      kind: rows_exact
      answer_key: runs
      run_id_column: experiment_id
      columns:
        - experiment_id
        - fidelity
        - utility_tstr_roc_auc
        - detection_roc_auc
        - privacy_dcr_score
        - stderr_size_bytes
  - task_id: tabdiff_ddxplus_dcr_checkpoint_provenance
    category: provenance_audit
    prompt: |
      For the model card of the ddxplus privacy (DCR) study we need sampling provenance. Each TabDiff sampling run prints the checkpoint file it loaded and the parameter count of the loaded model in its stdout log. For every sample_tabdiff.py run that sampled the ddxplus_dcr dataset, report the checkpoint file it loaded and the loaded model's parameter count.

      Required answer shape:
      {
        "runs": [{
          "experiment_id": string,
          "checkpoint_file": string,
          "model_parameters": integer
        }]
      }
      Sort by experiment_id ascending. experiment_id is the short run id that names the run directory, not the human-readable run name. checkpoint_file is the bare checkpoint file name. model_parameters is an integer without separators.
    expected:
      kind: rows_exact
      answer_key: runs
      run_id_column: experiment_id
      columns:
        - experiment_id
        - checkpoint_file
        - model_parameters
  - task_id: best_detection_eval_method_audit
    category: result_audit
    prompt: |
      Before publishing the detection benchmark we audit the winning run. Find the completed eval.py run with the highest latest detection_roc_auc. Its eval log states which detection method produced the score. Report the run, its latest detection_roc_auc, and the detection method name exactly as the log states it.

      Required answer shape:
      {
        "best_run": {
          "experiment_id": string,
          "detection_roc_auc": number,
          "detection_method": string
        }
      }
      Break ties by experiment_id ascending.
    expected:
      kind: first_row_object
      answer_key: best_run
      run_id_column: experiment_id
      columns:
        - experiment_id
        - detection_roc_auc
        - detection_method
  - task_id: cancelled_train_interrupt_triage
    category: failure_triage
    prompt: |
      We are writing an incident note about training jobs that did not complete. For every non-completed run, report its status, its stderr.txt size in bytes, whether its stderr log contains a Python KeyboardInterrupt, and the 1-based stderr line number of the last KeyboardInterrupt occurrence.

      Required answer shape:
      {
        "runs": [{
          "experiment_id": string,
          "status": string,
          "stderr_size_bytes": integer|null,
          "keyboard_interrupt": boolean,
          "interrupt_line_number": integer|null
        }]
      }
      Sort by experiment_id ascending. Use null when stderr.txt is unavailable or KeyboardInterrupt is absent.
    expected:
      kind: rows_exact
      answer_key: runs
      run_id_column: experiment_id
      columns:
        - experiment_id
        - status
        - stderr_size_bytes
        - keyboard_interrupt
        - interrupt_line_number
