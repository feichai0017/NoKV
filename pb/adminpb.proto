// Use scripts/gen.sh to generate .pb.go files.
syntax = "proto3";

package pb;

import "metapb.proto";

option go_package = "github.com/feichai0017/NoKV/pb";

message AddPeerRequest {
  uint64 region_id = 1;
  uint64 store_id = 2;
  uint64 peer_id = 3;
}

message AddPeerResponse {
  RegionMeta region = 1;
}

message RemovePeerRequest {
  uint64 region_id = 1;
  uint64 peer_id = 2;
}

message RemovePeerResponse {
  RegionMeta region = 1;
}

message TransferLeaderRequest {
  uint64 region_id = 1;
  uint64 peer_id = 2;
}

message TransferLeaderResponse {
  RegionMeta region = 1;
}

message ExportRegionSnapshotRequest {
  uint64 region_id = 1;
}

message ExportRegionSnapshotResponse {
  bytes snapshot = 1;
  RegionMeta region = 2;
}

message ExportRegionSnapshotStreamRequest {
  uint64 region_id = 1;
}

message ExportRegionSnapshotStreamResponse {
  bytes snapshot_header = 1;
  RegionMeta region = 2;
  bytes chunk = 3;
}

message ImportRegionSnapshotRequest {
  bytes snapshot = 1;
}

message ImportRegionSnapshotResponse {
  RegionMeta region = 1;
}

message ImportRegionSnapshotStreamRequest {
  bytes snapshot_header = 1;
  RegionMeta region = 2;
  bytes chunk = 3;
}

message RegionRuntimeStatusRequest {
  uint64 region_id = 1;
}

message RegionRuntimeStatusResponse {
  bool known = 1;
  bool hosted = 2;
  uint64 local_peer_id = 3;
  uint64 leader_peer_id = 4;
  bool leader = 5;
  RegionMeta region = 6;
  uint64 applied_index = 7;
  uint64 applied_term = 8;
}

service RaftAdmin {
  rpc AddPeer(AddPeerRequest) returns (AddPeerResponse);
  rpc RemovePeer(RemovePeerRequest) returns (RemovePeerResponse);
  rpc TransferLeader(TransferLeaderRequest) returns (TransferLeaderResponse);
  rpc ExportRegionSnapshot(ExportRegionSnapshotRequest) returns (ExportRegionSnapshotResponse);
  rpc ExportRegionSnapshotStream(ExportRegionSnapshotStreamRequest) returns (stream ExportRegionSnapshotStreamResponse);
  rpc ImportRegionSnapshot(ImportRegionSnapshotRequest) returns (ImportRegionSnapshotResponse);
  rpc ImportRegionSnapshotStream(stream ImportRegionSnapshotStreamRequest) returns (ImportRegionSnapshotResponse);
  rpc RegionRuntimeStatus(RegionRuntimeStatusRequest) returns (RegionRuntimeStatusResponse);
}
