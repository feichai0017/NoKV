// Use scripts/gen.sh to generate .pb.go files.
syntax = "proto3";

package nokv.meta.v1;

import "meta/region.proto";

option go_package = "github.com/feichai0017/NoKV/pb/meta;metapb";

enum DescriptorLineageKind {
  DESCRIPTOR_LINEAGE_KIND_UNSPECIFIED = 0;
  DESCRIPTOR_LINEAGE_KIND_SPLIT_PARENT = 1;
  DESCRIPTOR_LINEAGE_KIND_MERGE_SOURCE = 2;
}

message DescriptorLineageRef {
  uint64 region_id = 1;
  nokv.meta.v1.RegionEpoch epoch = 2;
  bytes hash = 3;
  DescriptorLineageKind kind = 4;
}

message RegionDescriptor {
  uint64 region_id = 1;
  bytes start_key = 2;
  bytes end_key = 3;
  nokv.meta.v1.RegionEpoch epoch = 4;
  repeated nokv.meta.v1.RegionPeer peers = 5;
  nokv.meta.v1.RegionReplicaState state = 6;
  repeated DescriptorLineageRef lineage = 7;
  uint64 root_epoch = 8;
  bytes hash = 9;
}
