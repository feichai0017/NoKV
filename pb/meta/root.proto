// Use scripts/gen.sh to generate .pb.go files.
syntax = "proto3";

package nokv.meta.v1;

import "meta/descriptor.proto";

option go_package = "github.com/feichai0017/NoKV/pb/meta;metapb";

enum RootEventKind {
  ROOT_EVENT_KIND_UNSPECIFIED = 0;
  ROOT_EVENT_KIND_STORE_JOINED = 1;
  ROOT_EVENT_KIND_STORE_LEFT = 2;
  ROOT_EVENT_KIND_REGION_BOOTSTRAP = 4;
  ROOT_EVENT_KIND_REGION_DESCRIPTOR_PUBLISHED = 5;
  ROOT_EVENT_KIND_REGION_TOMBSTONED = 6;
  ROOT_EVENT_KIND_REGION_SPLIT_COMMITTED = 8;
  ROOT_EVENT_KIND_REGION_MERGED = 9;
  ROOT_EVENT_KIND_PEER_ADDED = 10;
  ROOT_EVENT_KIND_PEER_REMOVED = 11;
}

message RootCursor {
  uint64 term = 1;
  uint64 index = 2;
}

message RootState {
  uint64 cluster_epoch = 1;
  uint64 membership_epoch = 2;
  RootCursor last_committed = 4;
  uint64 id_fence = 5;
  uint64 tso_fence = 6;
}

message RootCheckpoint {
  RootState state = 1;
  repeated nokv.meta.v1.RegionDescriptor descriptors = 2;
  uint64 log_offset = 3;
}

message RootStoreMembership {
  uint64 store_id = 1;
  string address = 2;
}

message RootRegionDescriptor {
  nokv.meta.v1.RegionDescriptor descriptor = 1;
}

message RootRegionRemoval {
  uint64 region_id = 1;
}

message RootRangeSplit {
  uint64 parent_region_id = 1;
  bytes split_key = 2;
  nokv.meta.v1.RegionDescriptor left = 3;
  nokv.meta.v1.RegionDescriptor right = 4;
}

message RootRangeMerge {
  uint64 left_region_id = 1;
  uint64 right_region_id = 2;
  nokv.meta.v1.RegionDescriptor merged = 3;
}

message RootPeerChange {
  uint64 region_id = 1;
  uint64 store_id = 2;
  uint64 peer_id = 3;
  nokv.meta.v1.RegionDescriptor descriptor = 4;
}

message RootEvent {
  RootEventKind kind = 1;
  oneof payload {
    RootStoreMembership store_membership = 2;
    RootRegionDescriptor region_descriptor = 3;
    RootRegionRemoval region_removal = 4;
    RootRangeSplit range_split = 5;
    RootRangeMerge range_merge = 6;
    RootPeerChange peer_change = 7;
  }
}
