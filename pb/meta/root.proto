// Use scripts/gen.sh to generate .pb.go files.
syntax = "proto3";

package nokv.meta.v1;

import "meta/descriptor.proto";

option go_package = "github.com/feichai0017/NoKV/pb/meta;metapb";

enum RootEventKind {
  ROOT_EVENT_KIND_UNSPECIFIED = 0;
  ROOT_EVENT_KIND_STORE_JOINED = 1;
  ROOT_EVENT_KIND_STORE_RETIRED = 2;
  ROOT_EVENT_KIND_ID_ALLOCATOR_FENCED = 3;
  ROOT_EVENT_KIND_REGION_BOOTSTRAP = 4;
  ROOT_EVENT_KIND_REGION_DESCRIPTOR_PUBLISHED = 5;
  ROOT_EVENT_KIND_REGION_TOMBSTONED = 6;
  ROOT_EVENT_KIND_TSO_ALLOCATOR_FENCED = 7;
  ROOT_EVENT_KIND_REGION_SPLIT_PLANNED = 8;
  ROOT_EVENT_KIND_REGION_SPLIT_COMMITTED = 9;
  ROOT_EVENT_KIND_REGION_SPLIT_CANCELLED = 16;
  ROOT_EVENT_KIND_REGION_MERGE_PLANNED = 10;
  ROOT_EVENT_KIND_REGION_MERGED = 11;
  ROOT_EVENT_KIND_REGION_MERGE_CANCELLED = 17;
  ROOT_EVENT_KIND_PEER_ADDITION_PLANNED = 12;
  ROOT_EVENT_KIND_PEER_REMOVAL_PLANNED = 13;
  ROOT_EVENT_KIND_PEER_ADDED = 14;
  ROOT_EVENT_KIND_PEER_REMOVED = 15;
  ROOT_EVENT_KIND_PEER_ADDITION_CANCELLED = 18;
  ROOT_EVENT_KIND_PEER_REMOVAL_CANCELLED = 19;
  ROOT_EVENT_KIND_GRANT_ISSUED = 20;
  ROOT_EVENT_KIND_GRANT_SEALED = 21;
  ROOT_EVENT_KIND_GRANT_RETIRED = 22;
  ROOT_EVENT_KIND_SNAPSHOT_EPOCH_PUBLISHED = 23;
  ROOT_EVENT_KIND_SNAPSHOT_EPOCH_RETIRED = 24;
  ROOT_EVENT_KIND_MOUNT_REGISTERED = 25;
  ROOT_EVENT_KIND_MOUNT_RETIRED = 26;
  ROOT_EVENT_KIND_SUBTREE_AUTHORITY_DECLARED = 27;
  ROOT_EVENT_KIND_SUBTREE_HANDOFF_STARTED = 28;
  ROOT_EVENT_KIND_SUBTREE_HANDOFF_COMPLETED = 29;
  ROOT_EVENT_KIND_QUOTA_FENCE_UPDATED = 30;
  ROOT_EVENT_KIND_GRANT_INHERITED = 31;
}

message RootCursor {
  uint64 term = 1;
  uint64 index = 2;
}

message RootState {
  uint64 cluster_epoch = 1;
  uint64 membership_epoch = 2;
  RootCursor last_committed = 4;
  uint64 id_fence = 5;
  uint64 tso_fence = 6;
  repeated RootAuthorityGrant active_grants = 7;
  repeated RootGrantRetirement retired_grants = 8;
  repeated RootGrantInheritance grant_inheritances = 9;
  uint64 retired_era_floor = 10;
}

message RootCheckpoint {
  RootState state = 1;
  repeated nokv.meta.v1.RegionDescriptor descriptors = 2;
  uint64 tail_offset = 3;
  repeated RootPendingPeerChange pending_peer_changes = 4;
  repeated RootPendingRangeChange pending_range_changes = 5;
  repeated RootStore stores = 6;
  repeated RootSnapshotEpoch snapshot_epochs = 7;
  repeated RootMount mounts = 8;
  repeated RootSubtreeAuthority subtrees = 9;
  repeated RootQuotaFence quotas = 10;
}

message RootStoreMembership {
  uint64 store_id = 1;
}

enum RootStoreState {
  ROOT_STORE_STATE_UNSPECIFIED = 0;
  ROOT_STORE_STATE_ACTIVE = 1;
  ROOT_STORE_STATE_RETIRED = 2;
}

message RootStore {
  uint64 store_id = 1;
  RootStoreState state = 2;
  RootCursor joined_at = 3;
  RootCursor retired_at = 4;
}

message RootSnapshotEpoch {
  string snapshot_id = 1;
  string mount = 2;
  uint64 root_inode = 3;
  uint64 read_version = 4;
  RootCursor published_at = 5;
}

enum RootMountState {
  ROOT_MOUNT_STATE_UNSPECIFIED = 0;
  ROOT_MOUNT_STATE_ACTIVE = 1;
  ROOT_MOUNT_STATE_RETIRED = 2;
}

message RootMount {
  string mount_id = 1;
  uint64 root_inode = 2;
  uint32 schema_version = 3;
  RootMountState state = 4;
  RootCursor registered_at = 5;
  RootCursor retired_at = 6;
}

enum RootSubtreeAuthorityState {
  ROOT_SUBTREE_AUTHORITY_STATE_UNSPECIFIED = 0;
  ROOT_SUBTREE_AUTHORITY_STATE_ACTIVE = 1;
  ROOT_SUBTREE_AUTHORITY_STATE_HANDOFF = 2;
}

message RootSubtreeAuthority {
  string subtree_id = 1;
  string mount = 2;
  uint64 root_inode = 3;
  string authority_id = 4;
  uint64 era = 5;
  uint64 frontier = 6;
  RootSubtreeAuthorityState state = 7;
  RootCursor declared_at = 8;
  RootCursor handoff_started_at = 9;
  RootCursor handoff_completed_at = 10;
  string predecessor_authority_id = 11;
  uint64 predecessor_era = 12;
  uint64 predecessor_frontier = 13;
  string successor_authority_id = 14;
  uint64 successor_era = 15;
  uint64 inherited_frontier = 16;
}

message RootQuotaFence {
  string subject_id = 1;
  string mount = 2;
  uint64 subtree_root = 3;
  uint64 limit_bytes = 4;
  uint64 limit_inodes = 5;
  uint64 era = 6;
  uint64 frontier = 7;
  RootCursor updated_at = 8;
}

message RootAllocatorFence {
  uint64 minimum = 1;
}

enum RootDutyScopeKind {
  ROOT_DUTY_SCOPE_KIND_UNSPECIFIED = 0;
  ROOT_DUTY_SCOPE_KIND_GLOBAL = 1;
  ROOT_DUTY_SCOPE_KIND_MOUNT = 2;
  ROOT_DUTY_SCOPE_KIND_SUBTREE = 3;
  ROOT_DUTY_SCOPE_KIND_REGION_RANGE = 4;
}

message RootDutyScope {
  RootDutyScopeKind kind = 1;
  string mount_id = 2;
  uint64 subtree_root = 3;
  bytes start_key = 4;
  bytes end_key = 5;
}

message RootMonotoneBound {
  uint64 upper = 1;
}

message RootVersionBound {
  RootTailToken root_token = 1;
  uint64 descriptor_revision_ceiling = 2;
  uint64 max_root_lag = 3;
}

message RootBudgetBound {
  uint64 budget = 1;
}

message RootEpochBound {
  uint64 epoch = 1;
}

message RootDutyBound {
  oneof bound {
    RootMonotoneBound monotone = 1;
    RootVersionBound version = 2;
    RootBudgetBound budget = 3;
    RootEpochBound epoch = 4;
  }
}

message RootDutyGrant {
  string duty_id = 1;
  RootDutyScope scope = 2;
  RootDutyBound bound = 3;
}

message RootAuthorityGrant {
  string grant_id = 1;
  string holder_id = 2;
  uint64 era = 3;
  int64 expires_unix_nano = 4;
  RootCursor issued_at = 5;
  RootTailToken issued_root_token = 6;
  repeated RootDutyGrant duties = 7;
  repeated RootGrantRetirement predecessor_retirements = 8;
}

enum RootGrantRetirementMode {
  ROOT_GRANT_RETIREMENT_MODE_UNSPECIFIED = 0;
  ROOT_GRANT_RETIREMENT_MODE_SEALED_EXACT = 1;
  ROOT_GRANT_RETIREMENT_MODE_EXPIRED_BOUND = 2;
}

message RootGrantRetirement {
  string grant_id = 1;
  string holder_id = 2;
  uint64 era = 3;
  RootGrantRetirementMode mode = 4;
  repeated RootDutyGrant bounds = 5;
  RootCursor retired_at = 6;
  string inherited_by_grant_id = 7;
}

message RootGrantInheritance {
  string predecessor_grant_id = 1;
  string successor_grant_id = 2;
  RootCursor inherited_at = 3;
}

message RootGrantCertificate {
  RootAuthorityGrant grant = 1;
  string signer_key_id = 2;
  bytes signature = 3;
}

message RootAuthorityUsage {
  string duty_id = 1;
  RootDutyScope scope = 2;
  RootDutyBound usage = 3;
}

message RootAuthorityEvidence {
  RootGrantCertificate certificate = 1;
  RootAuthorityUsage usage = 2;
  repeated RootGrantRetirement observed_retirements = 3;
  uint64 observed_retired_era_floor = 4;
  int64 served_unix_nano = 5;
}

message RootAuthorityVerifierKey {
  string cluster_id = 1;
  string duty_id = 2;
  RootDutyScope scope = 3;
}

message RootAuthorityVerifierState {
  RootAuthorityVerifierKey key = 1;
  uint64 max_seen_era = 2;
  uint64 retired_era_floor = 3;
  RootTailToken max_root_token = 4;
  uint64 max_descriptor_revision = 5;
  RootDutyBound max_frontier = 6;
}

message RootAuthorityVerifierStore {
  repeated RootAuthorityVerifierState states = 1;
}

message RootRegionDescriptor {
  nokv.meta.v1.RegionDescriptor descriptor = 1;
}

message RootRegionRemoval {
  uint64 region_id = 1;
}

message RootRangeSplit {
  uint64 parent_region_id = 1;
  bytes split_key = 2;
  nokv.meta.v1.RegionDescriptor left = 3;
  nokv.meta.v1.RegionDescriptor right = 4;
  nokv.meta.v1.RegionDescriptor base_parent = 5;
}

message RootRangeMerge {
  uint64 left_region_id = 1;
  uint64 right_region_id = 2;
  nokv.meta.v1.RegionDescriptor merged = 3;
  nokv.meta.v1.RegionDescriptor base_left = 4;
  nokv.meta.v1.RegionDescriptor base_right = 5;
}

message RootPeerChange {
  uint64 region_id = 1;
  uint64 store_id = 2;
  uint64 peer_id = 3;
  nokv.meta.v1.RegionDescriptor target = 4;
  nokv.meta.v1.RegionDescriptor base = 5;
}

enum RootPendingPeerChangeKind {
  ROOT_PENDING_PEER_CHANGE_KIND_UNSPECIFIED = 0;
  ROOT_PENDING_PEER_CHANGE_KIND_ADDITION = 1;
  ROOT_PENDING_PEER_CHANGE_KIND_REMOVAL = 2;
}

message RootPendingPeerChange {
  uint64 region_id = 1;
  uint64 store_id = 2;
  uint64 peer_id = 3;
  RootPendingPeerChangeKind kind = 4;
  nokv.meta.v1.RegionDescriptor target = 5;
  nokv.meta.v1.RegionDescriptor base = 6;
}

enum RootPendingRangeChangeKind {
  ROOT_PENDING_RANGE_CHANGE_KIND_UNSPECIFIED = 0;
  ROOT_PENDING_RANGE_CHANGE_KIND_SPLIT = 1;
  ROOT_PENDING_RANGE_CHANGE_KIND_MERGE = 2;
}

message RootPendingRangeChange {
  uint64 region_id = 1;
  RootPendingRangeChangeKind kind = 2;
  uint64 parent_region_id = 3;
  uint64 left_region_id = 4;
  uint64 right_region_id = 5;
  nokv.meta.v1.RegionDescriptor left = 6;
  nokv.meta.v1.RegionDescriptor right = 7;
  nokv.meta.v1.RegionDescriptor merged = 8;
  nokv.meta.v1.RegionDescriptor base_parent = 9;
  nokv.meta.v1.RegionDescriptor base_left = 10;
  nokv.meta.v1.RegionDescriptor base_right = 11;
}

message RootEvent {
  RootEventKind kind = 1;
  oneof payload {
    RootStoreMembership store_membership = 2;
    RootAllocatorFence allocator_fence = 3;
    RootRegionDescriptor region_descriptor = 4;
    RootRegionRemoval region_removal = 5;
    RootRangeSplit range_split = 6;
    RootRangeMerge range_merge = 7;
    RootPeerChange peer_change = 8;
    RootAuthorityGrant grant = 9;
    RootGrantRetirement grant_retirement = 10;
    RootGrantInheritance grant_inheritance = 11;
    RootSnapshotEpoch snapshot_epoch = 12;
    RootMount mount = 13;
    RootSubtreeAuthority subtree_authority = 14;
    RootQuotaFence quota_fence = 15;
  }
}

enum RootAllocatorKind {
  ROOT_ALLOCATOR_KIND_UNSPECIFIED = 0;
  ROOT_ALLOCATOR_KIND_ID = 1;
  ROOT_ALLOCATOR_KIND_TSO = 2;
}

message MetadataRootSnapshotRequest {}

message MetadataRootSnapshotResponse {
  RootCheckpoint checkpoint = 1;
}

message MetadataRootAppendRequest {
  repeated RootEvent events = 1;
}

message MetadataRootAppendResponse {
  RootCursor cursor = 1;
  RootState state = 2;
}

message MetadataRootFenceAllocatorRequest {
  RootAllocatorKind kind = 1;
  uint64 minimum = 2;
}

message MetadataRootFenceAllocatorResponse {
  uint64 current = 1;
}

message MetadataRootStatusRequest {}

message MetadataRootStatusResponse {
  bool is_leader = 1;
  uint64 leader_id = 2;
}

message RootEunomiaState {
  repeated RootAuthorityGrant active_grants = 1;
  repeated RootGrantRetirement retired_grants = 2;
  repeated RootGrantInheritance grant_inheritances = 3;
  uint64 retired_era_floor = 4;
}

enum RootGrantAct {
  ROOT_GRANT_ACT_UNSPECIFIED = 0;
  ROOT_GRANT_ACT_ISSUE = 1;
  ROOT_GRANT_ACT_SEAL = 2;
  ROOT_GRANT_ACT_RETIRE_EXPIRED = 3;
  ROOT_GRANT_ACT_INHERIT = 4;
}

message RootGrantCommand {
  RootGrantAct kind = 1;
  string holder_id = 2;
  string grant_id = 3;
  int64 expires_unix_nano = 4;
  int64 now_unix_nano = 5;
  repeated RootDutyGrant requested_duties = 6;
  repeated RootAuthorityUsage exact_usages = 7;
  repeated string predecessor_grant_ids = 8;
}

enum RootGrantApplyStatus {
  ROOT_GRANT_APPLY_STATUS_UNSPECIFIED = 0;
  ROOT_GRANT_APPLY_STATUS_GRANTED = 1;
  ROOT_GRANT_APPLY_STATUS_HELD = 2;
  ROOT_GRANT_APPLY_STATUS_RETIRED = 3;
}

message MetadataRootApplyGrantRequest {
  RootGrantCommand command = 1;
}

message MetadataRootApplyGrantResponse {
  RootEunomiaState state = 1;
  RootGrantApplyStatus status = 2;
  RootGrantCertificate certificate = 3;
}

message RootTailToken {
  RootCursor cursor = 1;
  uint64 revision = 2;
}

message RootCommittedEvent {
  RootCursor cursor = 1;
  RootEvent event = 2;
}

message RootCommittedTail {
  int64 requested_offset = 1;
  int64 start_offset = 2;
  int64 end_offset = 3;
  repeated RootCommittedEvent records = 4;
}

message MetadataRootObserveCommittedRequest {
  int64 requested_offset = 1;
}

message MetadataRootObserveCommittedResponse {
  RootCheckpoint checkpoint = 1;
  RootCommittedTail tail = 2;
}

message MetadataRootObserveTailRequest {
  RootTailToken after = 1;
}

message MetadataRootObserveTailResponse {
  RootTailToken after = 1;
  RootTailToken token = 2;
  RootCheckpoint checkpoint = 3;
  RootCommittedTail tail = 4;
}

message MetadataRootWaitTailRequest {
  RootTailToken after = 1;
  uint64 timeout_millis = 2;
}

message MetadataRootWaitTailResponse {
  RootTailToken after = 1;
  RootTailToken token = 2;
  RootCheckpoint checkpoint = 3;
  RootCommittedTail tail = 4;
}

service MetadataRoot {
  rpc Snapshot(MetadataRootSnapshotRequest) returns (MetadataRootSnapshotResponse);
  rpc Append(MetadataRootAppendRequest) returns (MetadataRootAppendResponse);
  rpc FenceAllocator(MetadataRootFenceAllocatorRequest) returns (MetadataRootFenceAllocatorResponse);
  rpc Status(MetadataRootStatusRequest) returns (MetadataRootStatusResponse);
  rpc ApplyGrant(MetadataRootApplyGrantRequest) returns (MetadataRootApplyGrantResponse);
  rpc ObserveCommitted(MetadataRootObserveCommittedRequest) returns (MetadataRootObserveCommittedResponse);
  rpc ObserveTail(MetadataRootObserveTailRequest) returns (MetadataRootObserveTailResponse);
  rpc WaitTail(MetadataRootWaitTailRequest) returns (MetadataRootWaitTailResponse);
}
