// Use scripts/gen.sh to generate .pb.go files.
syntax = "proto3";

package nokv.meta.v1;

option go_package = "github.com/feichai0017/NoKV/pb/meta;metapb";

enum RegionReplicaState {
  REGION_REPLICA_STATE_UNSPECIFIED = 0;
  REGION_REPLICA_STATE_NEW = 1;
  REGION_REPLICA_STATE_RUNNING = 2;
  REGION_REPLICA_STATE_REMOVING = 3;
  REGION_REPLICA_STATE_TOMBSTONE = 4;
}

message RegionEpoch {
  uint64 version = 1;
  uint64 conf_version = 2;
}

message RegionPeer {
  uint64 store_id = 1;
  uint64 peer_id = 2;
}
