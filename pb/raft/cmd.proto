// Use scripts/gen.sh to generate .pb.go files.
syntax = "proto3";

package nokv.raft.v1;

import "meta/descriptor.proto";

option go_package = "github.com/feichai0017/NoKV/pb/raft;raftcmdpb";

message SplitCommand {
  uint64 parent_region_id = 1;
  bytes split_key = 2;
  nokv.meta.v1.RegionDescriptor child = 3;
}

message MergeCommand {
  uint64 target_region_id = 1;
  uint64 source_region_id = 2;
}

message AdminCommand {
  enum Type {
    UNKNOWN = 0;
    SPLIT = 1;
    MERGE = 2;
  }

  Type type = 1;
  SplitCommand split = 2;
  MergeCommand merge = 3;
}
