// Use scripts/gen.sh to generate .pb.go files.
syntax = "proto3";

package nokv.metadata.v1;

import "error/error.proto";
import "meta/region.proto";

option go_package = "github.com/feichai0017/NoKV/pb/metadata;metadatapb";

enum ReadConsistency {
  READ_CONSISTENCY_STRONG = 0;
  READ_CONSISTENCY_BOUNDED_STALE = 1;
}

enum ReadPreference {
  READ_PREFERENCE_LEADER_ONLY = 0;
  READ_PREFERENCE_FOLLOWER_PREFER = 1;
}

enum MetadataFamily {
  METADATA_FAMILY_UNSPECIFIED = 0;
  METADATA_FAMILY_MOUNT = 1;
  METADATA_FAMILY_INODE = 2;
  METADATA_FAMILY_DENTRY = 3;
  METADATA_FAMILY_PARENT = 4;
  METADATA_FAMILY_CHUNK = 5;
  METADATA_FAMILY_SESSION = 6;
  METADATA_FAMILY_QUOTA = 7;
  METADATA_FAMILY_SNAPSHOT = 8;
  METADATA_FAMILY_PATH_INDEX = 9;
  METADATA_FAMILY_WATCH = 10;
  METADATA_FAMILY_COMMAND_DEDUPE = 11;
  METADATA_FAMILY_SEGMENT = 12;
}

message MetadataContext {
  uint64 region_id = 1;
  nokv.meta.v1.RegionEpoch region_epoch = 2;
  nokv.meta.v1.RegionPeer peer = 3;
  ReadConsistency read_consistency = 4;
  ReadPreference read_preference = 5;
}

message MetadataKV {
  bytes key = 1;
  bytes value = 2;
  uint64 version = 3;
  uint64 expires_at = 4;
  MetadataFamily key_family = 5;
}

message MetadataKeyError {
  reserved 1, 2;
  reserved "locked", "write_conflict";

  MetadataKeyAlreadyExists already_exists = 3;
  string retryable = 4;
  string abort = 5;
}

message MetadataKeyAlreadyExists {
  bytes key = 1;
}

message MetadataGetRequest {
  MetadataContext context = 1;
  bytes key = 2;
  uint64 version = 3;
  MetadataFamily key_family = 4;
}

message MetadataGetResponse {
  MetadataKV kv = 1;
  bool not_found = 2;
  MetadataKeyError error = 3;
  nokv.error.v1.RegionError region_error = 4;
}

message MetadataBatchGetRequest {
  MetadataContext context = 1;
  repeated MetadataGetRequest requests = 2;
}

message MetadataBatchGetResponse {
  repeated MetadataGetResponse responses = 1;
  nokv.error.v1.RegionError region_error = 2;
}

message MetadataScanRequest {
  MetadataContext context = 1;
  bytes start_key = 2;
  uint32 limit = 3;
  uint64 version = 4;
  bool include_start = 5;
  bool reverse = 6;
  MetadataFamily key_family = 7;
  // prefix_key bounds scans to one storage-neutral fsmeta key prefix. It lets
  // tree-backed engines use native prefix iterators instead of scanning an
  // entire metadata family.
  bytes prefix_key = 8;
}

message MetadataScanResponse {
  repeated MetadataKV kvs = 1;
  MetadataKeyError error = 2;
  nokv.error.v1.RegionError region_error = 3;
}

enum MetadataPredicateKind {
  METADATA_PREDICATE_KIND_NOT_EXISTS = 0;
  METADATA_PREDICATE_KIND_EXISTS = 1;
  METADATA_PREDICATE_KIND_VALUE_EQUALS = 2;
  METADATA_PREDICATE_KIND_PREFIX_EMPTY = 3;
}

message MetadataPredicate {
  bytes key = 1;
  MetadataPredicateKind kind = 2;
  uint64 read_version = 3;
  bytes expected_value = 4;
  MetadataFamily key_family = 5;
}

message MetadataMutation {
  enum Op {
    PUT = 0;
    DELETE = 1;
  }

  Op op = 1;
  bytes key = 2;
  bytes value = 3;
  bool assertion_not_exist = 4;
  uint64 expires_at = 5;
  MetadataFamily key_family = 6;
  // retention_pin_version marks this mutation as a live MVCC-retention pin
  // when the mutation remains visible. It is storage-neutral evidence used by
  // metadata engines before pruning historical versions.
  uint64 retention_pin_version = 7;
}

message MetadataWatchKey {
  MetadataFamily key_family = 1;
  bytes key = 2;
}

enum MetadataWatchOperation {
  METADATA_WATCH_OPERATION_UNSPECIFIED = 0;
  METADATA_WATCH_OPERATION_CREATE = 1;
  METADATA_WATCH_OPERATION_UPDATE = 2;
  METADATA_WATCH_OPERATION_DELETE = 3;
  METADATA_WATCH_OPERATION_RENAME = 4;
  METADATA_WATCH_OPERATION_REPLACE = 5;
  METADATA_WATCH_OPERATION_LINK = 6;
}

message MetadataWatchEvent {
  MetadataFamily key_family = 1;
  bytes key = 2;
  MetadataWatchOperation operation = 3;
  uint64 parent = 4;
  string name = 5;
  uint64 inode = 6;
  uint64 old_parent = 7;
  string old_name = 8;
  uint64 new_parent = 9;
  string new_name = 10;
}

message MetadataCommand {
  bytes request_id = 1;
  string mount = 2;
  uint64 mount_key_id = 3;
  bytes primary_key = 4;
  uint64 read_version = 5;
  repeated MetadataPredicate predicates = 6;
  repeated MetadataMutation mutations = 7;
  repeated bytes watch_keys = 8;
  uint64 commit_version = 9;
  MetadataFamily primary_key_family = 10;
  repeated MetadataWatchKey watch_key_refs = 11;
  repeated MetadataWatchEvent watch_events = 12;
}

message MetadataCommitResult {
  uint64 commit_version = 1;
  uint64 region_id = 2;
  uint64 term = 3;
  uint64 index = 4;
  uint64 applied_mutations = 5;
}

message MetadataCommitRequest {
  MetadataContext context = 1;
  MetadataCommand command = 2;
}

message MetadataCommitResponse {
  MetadataCommitResult result = 1;
  MetadataKeyError error = 2;
  nokv.error.v1.RegionError region_error = 3;
}

enum MetadataApplyWatchEventSource {
  METADATA_APPLY_WATCH_EVENT_SOURCE_UNSPECIFIED = 0;
  METADATA_APPLY_WATCH_EVENT_SOURCE_COMMIT = 1;
}

message MetadataWatchApplyRequest {
  bytes key_prefix = 1;
  uint32 buffer = 2;
  uint64 resume_region_id = 3;
  uint64 resume_term = 4;
  uint64 resume_index = 5;
}

message MetadataApplyWatchEvent {
  uint64 region_id = 1;
  uint64 term = 2;
  uint64 index = 3;
  MetadataApplyWatchEventSource source = 4;
  uint64 commit_version = 5;
  repeated bytes keys = 6;
  repeated MetadataWatchEvent watch_events = 7;
}

message MetadataWatchApplyResponse {
  MetadataApplyWatchEvent event = 1;
  uint64 dropped_events = 2;
}

service MetadataPlane {
  rpc Get(MetadataGetRequest) returns (MetadataGetResponse);
  rpc BatchGet(MetadataBatchGetRequest) returns (MetadataBatchGetResponse);
  rpc Scan(MetadataScanRequest) returns (MetadataScanResponse);
  rpc CommitMetadata(MetadataCommitRequest) returns (MetadataCommitResponse);
  rpc WatchApply(MetadataWatchApplyRequest) returns (stream MetadataWatchApplyResponse);
}
