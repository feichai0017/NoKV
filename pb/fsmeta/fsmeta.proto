syntax = "proto3";

package nokv.fsmeta.v1;

option go_package = "github.com/feichai0017/NoKV/pb/fsmeta;fsmetapb";

enum InodeType {
  INODE_TYPE_UNSPECIFIED = 0;
  INODE_TYPE_FILE = 1;
  INODE_TYPE_DIRECTORY = 2;
}

message InodeRecord {
  uint64 inode = 1;
  InodeType type = 2;
  uint64 size = 3;
  uint32 mode = 4;
  uint32 link_count = 5;
  int64 created_unix_ns = 6;
  int64 updated_unix_ns = 7;
  bytes opaque_attrs = 8;
  uint64 child_count = 9;
}

message SessionRecord {
  string session = 1;
  uint64 inode = 2;
  int64 expires_unix_ns = 3;
}

message DentryRecord {
  uint64 parent = 1;
  string name = 2;
  uint64 inode = 3;
  InodeType type = 4;
}

message DentryAttrPair {
  DentryRecord dentry = 1;
  InodeRecord inode = 2;
}

message CreateInodeAttrs {
  InodeType type = 1;
  uint64 size = 2;
  uint32 mode = 3;
  int64 created_unix_ns = 4;
  int64 updated_unix_ns = 5;
  bytes opaque_attrs = 6;
}

message CreateRequest {
  string mount = 1;
  uint64 parent = 2;
  string name = 3;
  CreateInodeAttrs attrs = 4;
}

message CreateResponse {
  DentryRecord dentry = 1;
  InodeRecord inode = 2;
}

message UpdateInodeRequest {
  string mount = 1;
  uint64 parent = 2;
  uint64 inode = 3;
  string name = 4;
  bool set_size = 5;
  uint64 size = 6;
  bool set_mode = 7;
  uint32 mode = 8;
  bool set_updated_unix_ns = 9;
  int64 updated_unix_ns = 10;
  bool set_opaque_attrs = 11;
  bytes opaque_attrs = 12;
}

message UpdateInodeResponse {
  InodeRecord inode = 1;
}

message LookupRequest {
  string mount = 1;
  uint64 parent = 2;
  string name = 3;
}

message LookupResponse {
  DentryRecord dentry = 1;
}

message LookupPlusResponse {
  DentryAttrPair entry = 1;
}

message ReadDirRequest {
  string mount = 1;
  uint64 parent = 2;
  string start_after = 3;
  uint32 limit = 4;
  uint64 snapshot_version = 5;
}

message ReadDirResponse {
  repeated DentryRecord entries = 1;
}

message ReadDirPlusResponse {
  repeated DentryAttrPair entries = 1;
}

message WatchCursor {
  uint64 region_id = 1;
  uint64 term = 2;
  uint64 index = 3;
}

enum WatchEventSource {
  WATCH_EVENT_SOURCE_UNSPECIFIED = 0;
  WATCH_EVENT_SOURCE_COMMIT = 1;
  WATCH_EVENT_SOURCE_RESOLVE_LOCK = 2;
  WATCH_EVENT_SOURCE_RUNTIME_VISIBLE = 3;
}

message WatchSubtreeRequest {
  string mount = 1;
  uint64 root_inode = 2;
  bytes key_prefix = 3;
  bool descend_recursively = 4;
  WatchCursor resume_cursor = 5;
  uint32 back_pressure_window = 6;
}

message WatchEvent {
  WatchCursor raft_cursor = 1;
  uint64 commit_version = 2;
  WatchEventSource source = 3;
  bytes key = 4;
}

message WatchAck {
  WatchCursor cursor = 1;
}

message WatchCatchupComplete {
  WatchCursor cursor = 1;
}

message WatchReady {
  WatchCursor cursor = 1;
}

message WatchThrottle {
  uint32 outstanding = 1;
  uint32 limit = 2;
  string reason = 3;
}

message WatchSubtreeResponse {
  oneof payload {
    WatchEvent event = 1;
    WatchCatchupComplete catchup_complete = 2;
    WatchThrottle throttle = 3;
    WatchReady ready = 4;
  }
}

message WatchAckOrSubscribe {
  oneof body {
    WatchSubtreeRequest subscribe = 1;
    WatchAck ack = 2;
  }
}

message GetReadVersionRequest {
  string mount = 1;
}

message GetReadVersionResponse {
  uint64 read_version = 1;
}

message SnapshotSubtreeRequest {
  string mount = 1;
  uint64 root_inode = 2;
}

message SnapshotEvidenceRef {
  uint64 epoch_id = 1;
  bytes evidence_root = 2;
  bytes payload_digest = 3;
}

message SnapshotSubtreeResponse {
  string mount = 1;
  uint64 root_inode = 2;
  uint64 read_version = 3;
  repeated SnapshotEvidenceRef runtime_evidence = 4;
}

message RetireSnapshotSubtreeRequest {
  string mount = 1;
  uint64 root_inode = 2;
  uint64 read_version = 3;
  repeated SnapshotEvidenceRef runtime_evidence = 4;
}

message RetireSnapshotSubtreeResponse {}

message QuotaUsageRequest {
  string mount = 1;
  // scope=0 means mount-wide usage. Non-zero scopes are direct quota
  // accounting roots.
  uint64 scope = 2;
}

message QuotaUsageResponse {
  uint64 bytes = 1;
  uint64 inodes = 2;
}

message RenameRequest {
  string mount = 1;
  uint64 from_parent = 2;
  string from_name = 3;
  uint64 to_parent = 4;
  string to_name = 5;
}

message RenameResponse {}

message RenameSubtreeRequest {
  string mount = 1;
  uint64 from_parent = 2;
  string from_name = 3;
  uint64 to_parent = 4;
  string to_name = 5;
}

message RenameSubtreeResponse {}

message LinkRequest {
  string mount = 1;
  uint64 from_parent = 2;
  string from_name = 3;
  uint64 to_parent = 4;
  string to_name = 5;
}

message LinkResponse {}

message UnlinkRequest {
  string mount = 1;
  uint64 parent = 2;
  string name = 3;
}

message UnlinkResponse {}

message RemoveRequest {
  string mount = 1;
  uint64 parent = 2;
  string name = 3;
}

message RemoveResponse {}

message RemoveDirectoryRequest {
  string mount = 1;
  uint64 parent = 2;
  string name = 3;
}

message RemoveDirectoryResponse {}

message OpenWriteSessionRequest {
  string mount = 1;
  uint64 inode = 2;
  string session = 3;
  // Requested lease duration. The fsmeta service derives expires_unix_ns from
  // its own clock after admission and returns the committed SessionRecord.
  uint64 ttl_ns = 4;
}

message OpenWriteSessionResponse {
  SessionRecord session = 1;
}

message HeartbeatWriteSessionRequest {
  string mount = 1;
  uint64 inode = 2;
  string session = 3;
  // Requested extension duration. The fsmeta service is the authority for the
  // absolute expiry stored in SessionRecord.
  uint64 ttl_ns = 4;
}

message HeartbeatWriteSessionResponse {
  SessionRecord session = 1;
}

message CloseWriteSessionRequest {
  string mount = 1;
  string session = 2;
  uint64 inode = 3;
}

message CloseWriteSessionResponse {}

message ExpireWriteSessionsRequest {
  string mount = 1;
  uint32 limit = 2;
}

message ExpireWriteSessionsResponse {
  uint64 expired = 1;
}

service FSMetadata {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc UpdateInode(UpdateInodeRequest) returns (UpdateInodeResponse);
  rpc Lookup(LookupRequest) returns (LookupResponse);
  rpc LookupPlus(LookupRequest) returns (LookupPlusResponse);
  rpc ReadDir(ReadDirRequest) returns (ReadDirResponse);
  rpc ReadDirPlus(ReadDirRequest) returns (ReadDirPlusResponse);
  rpc WatchSubtree(stream WatchAckOrSubscribe) returns (stream WatchSubtreeResponse);
  rpc GetReadVersion(GetReadVersionRequest) returns (GetReadVersionResponse);
  rpc SnapshotSubtree(SnapshotSubtreeRequest) returns (SnapshotSubtreeResponse);
  rpc RetireSnapshotSubtree(RetireSnapshotSubtreeRequest) returns (RetireSnapshotSubtreeResponse);
  rpc GetQuotaUsage(QuotaUsageRequest) returns (QuotaUsageResponse);
  rpc Rename(RenameRequest) returns (RenameResponse);
  rpc RenameSubtree(RenameSubtreeRequest) returns (RenameSubtreeResponse);
  rpc Link(LinkRequest) returns (LinkResponse);
  rpc Unlink(UnlinkRequest) returns (UnlinkResponse);
  rpc Remove(RemoveRequest) returns (RemoveResponse);
  rpc RemoveDirectory(RemoveDirectoryRequest) returns (RemoveDirectoryResponse);
  rpc OpenWriteSession(OpenWriteSessionRequest) returns (OpenWriteSessionResponse);
  rpc HeartbeatWriteSession(HeartbeatWriteSessionRequest) returns (HeartbeatWriteSessionResponse);
  rpc CloseWriteSession(CloseWriteSessionRequest) returns (CloseWriteSessionResponse);
  rpc ExpireWriteSessions(ExpireWriteSessionsRequest) returns (ExpireWriteSessionsResponse);
}
